<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼룩말영어학원 고난도 단어장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl flex flex-col justify-between min-h-screen border-x border-slate-200">
        
        <header class="bg-indigo-600 text-white p-4 text-center shadow-md z-10">
            <h1 class="text-xl font-bold tracking-wide">🦓 얼룩말영어학원</h1>
            <p class="text-xs text-indigo-200 mt-1 font-medium">중등고난도7 목록 단어장 (30단어 원문 순서 고정)</p>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">

            <div class="flex justify-end gap-2 mb-4 text-xs font-medium">
                <button onclick="switchMode('list')" id="mode-list" class="px-3 py-1.5 rounded-full bg-slate-800 text-white shadow">목록 보기</button>
                <button onclick="switchMode('card')" id="mode-card" class="px-3 py-1.5 rounded-full bg-slate-200 text-slate-700">카드 학습</button>
            </div>

            <div id="vocab-container" class="space-y-3 pb-4"></div>

        </main>

        <footer class="bg-slate-50 border-t border-slate-200 p-3 text-center text-xs text-slate-500 z-10" id="app-footer">
            <div id="footer-content" class="w-full">© 얼룩말영어학원 | 스마트 단어 학습 시스템</div>
        </footer>
    </div>

    <script>
        // 7과 목록 원본 데이터 30개 고정 순서 배치 완료 
        const vocabData = [
            { word: "fluent", meaning: "(말·글이) 유창한", etymology: "라틴어 fluere(흐르다)에서 유래. 말이나 글이 막힘없이 물 흐르듯 매끄럽게 흘러나오는 상태.", cognates: "fluently (유창하게), fluency (유창함), fluid (유체, 액체)" },
            { word: "physics", meaning: "물리학", etymology: "그리스어 physis(자연, 자연의 본질)에서 유래. 자연 만물의 물질적 대원칙과 법칙을 연구하는 학문.", cognates: "physical (신체의, 물질적인), physicist (물리학자)" },
            { word: "linguistics", meaning: "언어학", etymology: "라틴어 lingua(혀, 언어) + ist + ics. 인간이 사용하는 언어의 구조, 역사, 체계를 과학적으로 연구하는 학문.", cognates: "linguist (언어학자), linguistic (언어의)" },
            { word: "figure", meaning: "그림; 수치; (사람의) 모습, 인물", etymology: "라틴어 fingere(형태를 만들다). 겉으로 드러나는 구체적인 모양새, 숫자 형태, 혹은 서적 안의 삽화.", cognates: "figurative (비유적인), figure out (~을 이해하다)" },
            { word: "insight", meaning: "통찰력, 간파", etymology: "in(안으로) + sight(보는 능력). 사물의 겉모습만 보는 것이 아니라, 그 내면의 본질을 꿰뚫어 보는 안목.", cognates: "insightful (통찰력 있는)" },
            { word: "intelligence", meaning: "지능, 이해력, 영리함", etymology: "inter(~ 사이에) + 라틴어 legere(고르다, 이해하다). 수많은 정보 사이에서 올바른 지식을 선택하고 이해하는 지적 역량.", cognates: "intelligent (영리한), intellectual (지적인)" },
            { word: "dwell on", meaning: "~을 깊이 생각하다. ~을 자세히 이야기하다", etymology: "dwell(거주하다, 머무르다) + 전치사 on. 마음이나 시선이 다른 곳으로 가지 않고 특정 주제 위에 오랫동안 멈물러 있는 양상.", cognates: "dweller (거주자)" },
            { word: "review", meaning: "복습하다. 다시 검토하다; 비평, 평론", etymology: "re-(다시) + view(바라보다). 지나온 길이나 이미 작성된 글을 다시 쳐다보며 교정하거나 되새기는 행위.", cognates: "reviewer (비평가)" },
            { word: "essence", meaning: "본질, 기초", etymology: "라틴어 esse(존재하다). 어떤 사물이 그 사물로서 존재하기 위해 결코 없어서는 안 되는 가장 핵심적인 내면 가치.", cognates: "essential (필수적인, 본질적인), essentially (본질적으로)" },
            { word: "statistics", meaning: "통계학, 통계 자료", etymology: "라틴어 status(국가 상태, 정치적 상황). 과거 국가의 인구와 재산을 파악하기 위해 수치를 모으던 학문에서 유래.", cognates: "statistical (통계적인), statistician (통계학자)" },
            { word: "geology", meaning: "지질학", etymology: "geo(지구, 땅) + logy(학문). 우리가 딛고 서 있는 지구와 암석의 역사, 구조, 성분을 연구하는 학문 분야.", cognates: "geologist (지질학자), geological (지질학과의)" },
            { word: "scholar", meaning: "학자, 장학생", etymology: "라틴어 schola(학교, 여가)에서 파생. 생계 활동 대신 학문 연구와 지식 탐구에 평생을 바치는 사람.", cognates: "scholarship (장학금, 학문), scholarly (학자적인)" },
            { word: "refer", meaning: "언급하다. 참고하다", etymology: "re-(뒤로) + 라틴어 ferre(나르다, 운반하다). 다른 곳에 서술된 정보나 대상을 대화 속으로 이끌어와 지칭하는 행위.", cognates: "reference (참고, 언급), referee (심판)" },
            { word: "concept", meaning: "개념, 발상", etymology: "con-(함께) + 라틴어 capere(마음속으로 붙잡다). 여러 현상 속에서 공통된 핵심 구조나 생각을 한데 묶어 마음속에 정립한 것.", cognates: "conception (개념, 임신), conceptual (개념적인)" },
            { word: "define", meaning: "정의하다. 명확히 하다", etymology: "de-(완전히) + 라틴어 finis(경계, 끝). 단어나 개념의 테두리에 명확한 경계선을 그어 뜻을 확실하게 한정 짓다.", cognates: "definition (정의), definite (명확한)" },
            { word: "demonstrate", meaning: "보여 주다, 증명하다. 설명하다; 시위하다", etymology: "de-(강조) + 라틴어 monstrare(가리키다, 보여주다). 말로만 하지 않고 구체적인 물증이나 행동을 눈앞에 직접 꺼내어 증명하다.", cognates: "demonstration (입증, 시위)" },
            { word: "look up", meaning: "(사전·컴퓨터 등에서 정보를) 찾아보고 조사하다", etymology: "look(시선을 던지다) + 부사 up(완전히 위로). 책장이나 화면을 위로 넘겨가며 필요한 정밀한 지식을 추적하여 찾아내는 행위.", cognates: "look (보다)" },
            { word: "improve", meaning: "향상시키다. 나아지다", etymology: "프랑스어 en(안으로) + prou(이익, 가치). 어떤 대상에 노력과 투자를 가해 질적인 가치를 안으로 높여주는 과정.", cognates: "improvement (개선, 향상)" },
            { word: "theory", meaning: "이론, 학설", etymology: "그리스어 theoria(정신적 관조, 깊이 바라봄). 단순한 추측에 그치지 않고 체계적인 관찰을 통해 정립한 논리적 지식 체계.", cognates: "theoretical (이론적인), theorist (이론가)" },
            { word: "diameter", meaning: "지름", etymology: "dia(가로질러) + meter(측정, 단위). 원이나 구체의 중심을 정중앙으로 관통하여 끝에서 끝까지 측정한 직선의 길이.", cognates: "metric (미터법의)" },
            { word: "literal", meaning: "글자 그대로의, 정확한", etymology: "라틴어 litera(문자, 글자). 비유적이거나 과장된 표현을 배제하고 오직 기록된 글자 본연의 정직한 의미를 뜻함.", cognates: "literally (말 그대로), literature (문학), literate (읽고 쓸 줄 아는)" },
            { word: "conclude", meaning: "끝내다. 결론 내리다", etymology: "con-(함께) + 라틴어 claudere(문을 닫다). 여러 논의와 주장을 한데 모아 정리한 뒤 최종적으로 문을 닫아 마무리 짓다.", cognates: "conclusion (결론), conclusive (결정적인)" },
            { word: "academic", meaning: "학업의, 학구적인", etymology: "그리스 아테네의 철학 학당인 '아카데미아(Akademia)'에서 유래. 순수한 학교 교육이나 고등 학문 연구와 관련된 성격.", cognates: "academy (학원, 한림원)" },
            { word: "go over", meaning: "~을 점검 [검토]하다, ~을 주의 깊게 살피다", etymology: "go(이동하다) + over(대상의 표면 전체를 가로질러). 서류나 데이터의 처음부터 끝까지 전체를 밟아가며 오류를 확인하는 행위.", cognates: "go (가다)" },
            { word: "expose", meaning: "노출시키다. 드러내다", etymology: "ex-(밖으로) + 라틴어 ponere(놓다). 안쪽에 안전하게 숨겨져 있던 대상을 바깥쪽 거친 환경에 그대로 꺼내어 놓다.", cognates: "exposure (노출), exposition (박람회, 설명)" },
            { word: "literate", meaning: "읽고 쓸 줄 아는, 교양 있는", etymology: "라틴어 litera(문자, 글자) + ate. 문자를 인지하고 해독하여 지식을 습득할 수 있는 기초적인 지적 능력을 갖춘.", cognates: "literacy (문해력), illiterate (문맹의)" },
            { word: "solve", meaning: "풀다. 해결하다", etymology: "라틴어 solvere(느슨하게 풀다, 밧줄을 해체하다). 꽁꽁 묶여 풀리지 않던 복잡한 문제나 매듭을 느슨하게 풀어 자유롭게 하다.", cognates: "solution (해결책, 용액), soluble (녹는, 해결 가능한)" },
            { word: "principle", meaning: "원리, 원칙", etymology: "라틴어 princeps(가장 첫 번째의 것, 군주). 모든 하위 규칙이나 행동 양식보다 가장 앞서서 기본 뼈대를 이루는 대전제.", cognates: "principal (교장, 주요한)" },
            { word: "content", meaning: "내용, 목차; 만족하는 만족시키다", etymology: "con-(함께) + 라틴어 tenere(쥐다, 보유하다). 용기나 책 속에 담겨 소유되어 있는 구성물, 혹은 마음이 꽉 차서 평온한 상태.", cognates: "contention (논쟁)" },
            { word: "inspire", meaning: "격려하다. 영감을 주다", etymology: "in-(안으로) + 라틴어 spirare(숨을 불어넣다). 침체되어 있는 타인의 마음속 깊은 곳에 새로운 예술적·도덕적 기운을 불어넣다.", cognates: "inspiration (영감), respiratory (호흡기계의)" }
        ];

        let currentMode = 'list';
        let cardIndex = 0;

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0; 
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const footerContent = document.getElementById('footer-content');

            if (currentMode === 'list') {
                footerContent.className = "w-full text-slate-400 text-center py-1";
                footerContent.innerHTML = `© 얼룩말영어학원 | 스마트 단어 학습 시스템`;
                
                container.innerHTML = vocabData.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = vocabData[cardIndex];
                
                footerContent.className = "w-full flex justify-between items-center px-2";
                footerContent.innerHTML = `
                    <button onclick="prevCard()" class="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg ${cardIndex === 0 ? 'opacity-50 pointer-events-none' : ''}">이전</button>
                    <span class="font-semibold text-slate-600">${cardIndex + 1} / ${vocabData.length}</span>
                    <button onclick="nextCard()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg ${cardIndex === vocabData.length - 1 ? 'opacity-50 pointer-events-none' : ''}">다음</button>
                `;
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-3xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData.length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Initialize App
        renderContent();
    </script>
</body>
</html>
