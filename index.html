<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중등고난도 메타인지 단어장 (21~22강)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .accordion-content { transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s ease, opacity 0.35s ease; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 400px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        .tab-btn.active { color: #7e22ce; border-bottom-color: #7e22ce; font-weight: 700; background-color: #faf5ff; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight"><i class="fa-solid fa-gavel text-purple-400 mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-slate-300 mt-1">사회·윤리(21) / 법·범죄(22)</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-slate-800 border border-slate-600 text-purple-300 px-3 py-1.5 rounded-full text-sm font-bold shadow-md hover:bg-slate-700 transition">
            <i class="fa-solid fa-clone mr-1"></i> 카드모드
        </button>
    </header>

    <div class="flex bg-white shadow-sm sticky top-[72px] z-10 border-b border-slate-200">
        <button id="tab-21" onclick="setLesson(21)" class="tab-btn active flex-1 py-3 text-sm text-slate-500 border-b-2 border-transparent transition duration-200">
            <i class="fa-solid fa-users mr-1"></i> 21강 (30단어)
        </button>
        <button id="tab-22" onclick="setLesson(22)" class="tab-btn flex-1 py-3 text-sm text-slate-500 border-b-2 border-transparent transition duration-200">
            <i class="fa-solid fa-handcuffs mr-1"></i> 22강 (30단어)
        </button>
    </div>

    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24 bg-slate-50">
        <!-- JS로 동적 렌더링 됨 -->
    </main>

    <div id="flashcardView" class="hidden absolute inset-0 bg-slate-900 bg-opacity-95 z-30 flex-col pb-10 backdrop-blur-sm">
        <div class="flex justify-between items-center p-5 text-white">
            <span id="flashcardCounter" class="text-sm font-bold bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 text-purple-300 shadow-inner">1 / 30</span>
            <button onclick="toggleMode()" class="text-slate-400 hover:text-white transition transform hover:rotate-90"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>

        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[65vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 앞면 -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-t-8 border-purple-600">
                    <span id="cardGroup" class="absolute top-6 text-[0.7rem] font-bold text-purple-800 bg-purple-100 px-3 py-1.5 rounded-full shadow-sm">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-black text-slate-800 mb-4 tracking-tight break-words">Word</h2>
                    <p class="text-slate-400 text-sm mt-6 font-semibold animate-pulse"><i class="fa-solid fa-rotate mr-2"></i>카드를 뒤집어 뜻 확인</p>
                </div>

                <!-- 뒷면 -->
                <div class="absolute inset-0 w-full h-full bg-slate-800 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-6 text-white overflow-y-auto border-t-8 border-purple-400">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-2 border-b border-slate-600 pb-2 text-purple-300">Word</h2>
                    <p id="cardMeaning" class="text-xl font-black mb-5">의미</p>
                    
                    <div class="bg-slate-900 rounded-xl p-4 mb-4 shadow-inner border border-slate-700">
                        <p class="text-[0.7rem] text-purple-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-book-open mr-1"></i> 어원의 비밀 (Semantic Shift)</p>
                        <p id="cardRoot" class="text-[0.9rem] leading-relaxed text-slate-200 font-medium break-keep">어원 설명</p>
                    </div>
                    
                    <div class="bg-slate-900 rounded-xl p-4 shadow-inner border border-slate-700">
                        <p class="text-[0.7rem] text-sky-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Family)</p>
                        <p id="cardCognates" class="text-sm font-medium text-sky-100">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-center items-center space-x-8 px-6 pb-4">
            <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-slate-800 text-white flex justify-center items-center active:bg-slate-700 hover:bg-slate-700 transition shadow-lg border border-slate-600">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
            <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-purple-600 text-white flex justify-center items-center active:bg-purple-500 hover:bg-purple-500 transition shadow-[0_0_20px_rgba(147,51,234,0.4)]">
                <i class="fa-solid fa-chevron-right text-2xl"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const db = {
        // ==========================================
        // 21강: 사회, 윤리, 조직 (역추론 및 단어 배정 완료)
        // ==========================================
        21: [
            // [1. 사회와 조직]
            { word: "social", meaning: "사회의", root: "soc(동료, 엮다) + ial → 사람들이 동료로 엮여 무리를 이루어 살아가는 '사회의' 모습.", cognates: "society(사회), associate(연관시키다)", group: "1. 사회와 조직" },
            { word: "organization", meaning: "조직, 단체, 기구", root: "organ(도구, 기관) + ization → 각자의 역할을 맡은 장기(기관)들이 톱니바퀴처럼 하나의 도구로 움직이는 거대한 '조직'.", cognates: "organ(장기, 오르간), organic(유기적인)", group: "1. 사회와 조직" },
            { word: "status", 초: "status", meaning: "지위, 신분; 상태", root: "sta(서다) + tus → 사회라는 피라미드 안에서 내가 어느 높이에 '서 있는가(위치)'를 나타내는 '신분이나 지위'.", cognates: "state(상태, 국가), statue(조각상)", group: "1. 사회와 조직" },
            { word: "standard", meaning: "표준, 기준; 표준의", root: "stand(서다) + ard → 전쟁터에서 군인들이 모여야 할 장소를 알리기 위해 깃발을 '세워둔 곳'에서 유래하여 모두가 따르는 '기준'.", cognates: "stand(서다)", group: "1. 사회와 조직" },
            { word: "circumstance", meaning: "상황, 환경", root: "circum(주변에) + sta(서다) + nce → 내가 한가운데 서 있을 때 내 '주변을(circum) 빙 둘러서서(sta) 벌어지고 있는 일들(상황)'.", cognates: "circle(원), distance(거리)", group: "1. 사회와 조직" },

            // [2. 가치와 도덕]
            { word: "ethics", meaning: "윤리, 도덕", root: "ethos(성격, 관습) + ics(학문) → 옛날부터 사람들이 다 같이 지키기로 약속한 올바른 관습이나 성품을 연구하는 '윤리학'.", cognates: "ethical(윤리적인)", group: "2. 가치와 도덕" },
            { word: "moral", meaning: "도덕적인; 교훈, (pl.) 도덕", root: "mos(관습, 예의) + al → 사람이라면 마땅히 짐승과 달리 마음속에 지니고 행동해야 할 올바른 예의와 '도덕적인' 법칙.", cognates: "morale(사기, 의욕)", group: "2. 가치와 도덕" },
            { word: "charity", meaning: "자선, 자선 단체; 구호물자", root: "carus(소중한, 사랑) + ity → 어려운 이웃을 소중히 여기는 헌신적인 사랑에서 우러나와 베푸는 아름다운 '자선' 행위.", cognates: "cherish(소중히 여기다), caress(애무하다)", group: "2. 가치와 도덕" },
            { word: "volunteer", meaning: "자원봉사자; 자발적으로 ~하다", root: "volunt(자유 의지) + eer(사람) → 누가 등 떠밀거나 돈을 주지 않아도, 오직 자기 자신의 '의지(volunt)'로 나서는 '자원봉사자'.", cognates: "voluntary(자발적인)", group: "2. 가치와 도덕" },
            { word: "stereotype", meaning: "고정 관념", root: "stereo(단단한, 입체) + type(인쇄 활자) → 옛날 인쇄소에서 한 번 만들면 형태를 깰 수 없던 쇳덩이 활자처럼, 사람들의 머릿속에 콱 박혀 안 변하는 '고정 관념'.", cognates: "stereo(스테레오), type(유형)", group: "2. 가치와 도덕" },

            // [3. 얻음과 기회]
            { word: "acquire", meaning: "얻다, 습득하다", root: "ad(~쪽으로) + quir(구하다) → 내가 갖고 싶은 지식이나 물건 쪽으로 다가가서 끈질기게 손을 뻗어 마침내 내 것으로 '얻어내다'.", cognates: "require(요구하다), inquire(질문하다)", group: "3. 얻음과 기회" },
            { word: "opportunity", meaning: "기회", root: "ob(~를 향해) + port(항구) + unity → 돛단배가 먼 길을 돌다 마침내 항구를 향해 순풍이 쫙 불어주는, 놓칠 수 없는 완벽한 타이밍의 '기회'.", cognates: "port(항구), passport(여권)", group: "3. 얻음과 기회" },
            { word: "advantage", meaning: "이익, 유리한 점", root: "ab(앞으로) + avant(앞) → 출발선에서 다른 사람들보다 반 발짝 더 '앞에(avant) 서서' 시작할 수 있는 아주 '유리한 입장'.", cognates: "advance(전진하다), vanguard(선봉)", group: "3. 얻음과 기회" },
            { word: "prospect", meaning: "전망, 가능성", root: "pro(앞) + spect(보다) → 캄캄한 숲을 빠져나와 탁 트인 산꼭대기에 서서, 내 앞에 펼쳐질 미래의 길을 훤히 내다보는 '전망'.", cognates: "inspect(조사하다), suspect(의심하다)", group: "3. 얻음과 기회" },
            { word: "factor", meaning: "요소, 요인", root: "fac(만들다) + tor(~하는 것) → 어떤 복잡한 사건이나 결과를 만들어내는(fac) 데 결정적인 역할을 한 핵심적인 '요소'.", cognates: "factory(공장), manufacture(제조하다)", group: "3. 얻음과 기회" },

            // [4. 허락과 적절성]
            { word: "permit", meaning: "허락하다, 허가하다", root: "per(완전히, 통과하여) + mit(보내다) → 엄격한 문지기가 서류를 꼼꼼히 확인한 후, 문을 통과하여 지나가도록(mit) '허락하다'.", cognates: "admit(인정하다), submit(제출하다)", group: "4. 허락과 적절성" },
            { word: "proper", meaning: "적절한, 알맞은", root: "propri(자신의, 알맞은) → 남의 옷을 빌려 입어 헐렁한 것이 아니라, 오직 자기 몸의 치수에 딱 맞게 만들어져서 아주 '적절한'.", cognates: "property(재산, 특성), appropriate(적절한)", group: "4. 허락과 적절성" },
            { word: "inadequate", meaning: "부적당한, 불충분한", root: "in(부정) + ad(~에) + equ(같은) + ate → 어떤 직업이나 기준에 요구되는 능력치와 똑같이(equ) 채워지지 못해(in) '불충분한'.", cognates: "equal(같은), adequate(충분한)", group: "4. 허락과 적절성" },
            { word: "convenience", meaning: "편의, 편리, (pl.) 편의 시설", root: "con(함께) + ven(오다) + ience → 필요한 물건들이 멀리 떨어져 있지 않고 한곳에 싹 다 함께(con) 모여 있어서(ven) 너무 '편리한' 상태.", cognates: "convene(소집하다), advent(도래)", group: "4. 허락과 적절성" },
            { word: "deserve", meaning: "~할 자격이 있다, ~할 만하다", root: "de(완전히) + serv(섬기다, 봉사하다) → 회사나 주인을 위해 몸 바쳐 완전히(de) 땀 흘려 봉사했으니(serv), 두둑한 보상을 '받을 자격이 충분하다'.", cognates: "serve(제공하다), servant(하인)", group: "4. 허락과 적절성" },

            // [5. 변화와 영향]
            { word: "affect", meaning: "~에 영향을 미치다", root: "ad(~에) + fect(만들다, 행하다) → 잔잔한 호수에 돌을 휙 던져 파동을 만들어내듯, 어떤 대상에게 작용하여 마음이나 상태를 뒤흔들고 '영향을 주다'.", cognates: "effect(결과, 효과), infect(감염시키다)", group: "5. 변화와 영향" },
            { word: "indicate", meaning: "나타내다, 가리키다", root: "in(안으로, 향해서) + dic(말하다) + ate → 말로만 두루뭉술하게 하지 않고, 손가락을 정확한 곳을 향해 뻗으며 확실하게 말로 '가리켜 보여주다'.", cognates: "dictate(지시하다), dictionary(사전)", group: "5. 변화와 영향" },
            { word: "complex", meaning: "복잡한; 복합 건물", root: "com(함께) + plex(접다, 꼬다) → 실타래 하나가 아니라, 수십 개의 실들이 자기들끼리 얽히고설켜 꽉 꼬여버려서 풀기 너무 '복잡한' 상태.", cognates: "perplex(당혹스럽게 하다), duplex(이중의)", group: "5. 변화와 영향" },
            { word: "expire", meaning: "만기가 되다", root: "ex(밖으로) + spir(숨을 쉬다) → 폐 속에 있던 마지막 숨을 몸 밖으로 하~ 하고 다 내뱉어 생명이 끝나듯, 계약 기간이 죽어버려 '만기가 되다'.", cognates: "inspire(영감을 주다), spirit(정신)", group: "5. 변화와 영향" },
            { word: "secure", meaning: "안전한", root: "se(떨어져) + cur(걱정, 돌봄) → 튼튼한 금고 안에 귀중품을 넣어두어, 도둑맞을 '걱정으로부터(cur) 완전히 떨어져(se)' 마음이 푹 놓이고 '안전한'.", cognates: "cure(치료하다), curious(호기심 많은)", group: "5. 변화와 영향" },

            // [6. 구동사 및 기타]
            { word: "contribute to", meaning: "~의 한 원인이 되다; ~에 기여하다", root: "con(함께) + tribut(주다) → 혼자 잘난 척하는 게 아니라, 거대한 프로젝트 성공을 위해 모두가 함께(con) 자신의 재능이나 돈을 '내어주며(tribut) 기여하다'.", cognates: "tribute(헌사, 공물), distribute(분배하다)", group: "6. 구동사 및 복합어" },
            { word: "tend to", meaning: "~하는 경향이 있다, ~하기 쉽다", root: "tend(뻗다, 향하다) → 활시위가 과녁을 향해 당겨져 있듯, 사람의 행동이나 자연 현상이 자꾸만 한쪽 방향으로 '뻗어 나가는(tend) 경향이 있다'.", cognates: "extend(연장하다), tendon(힘줄)", group: "6. 구동사 및 복합어" },
            { word: "enroll", meaning: "(강좌 등에) 등록하다, 가입하다", root: "en(안으로) + roll(두루마리) → 옛날 학교에서 학생을 받을 때, 이름이 적힌 두루마리(명부) 안쪽에 새 학생의 이름을 써넣어 '등록시키다'.", cognates: "roll(구르다, 명부)", group: "6. 구동사 및 복합어" },
            { word: "put off", meaning: "~을 연기하다[보류하다]", root: "put(놓다) + off(떨어져) → 오늘 당장 해야 할 골치 아픈 숙제 책상 위에서 '저 멀리 떨어뜨려(off) 치워 놓다(put)' -> 나중으로 '연기하다'.", cognates: "put, off", group: "6. 구동사 및 복합어" },
            { word: "liberty", meaning: "자유; 해방, 석방", root: "liber(자유로운) + ty → 감옥의 쇠창살이나 노예의 족쇄에 묶여있지 않고, 내 마음대로 어디든 갈 수 있도록 풀려난 완전한 '자유'.", cognates: "liberal(자유주의의), deliver(해방하다, 배달하다)", group: "6. 구동사 및 복합어" }
        ],

        // ==========================================
        // 22강: 법, 범죄, 재판
        // ==========================================
        22: [
            // [1. 법과 판결]

            { word: "confess", meaning: "자백하다, 고백하다", root: "con(함께, 완전히) + fess(말하다) → 컴컴한 조사실에서 형사에게 꽁꽁 숨겨두었던 끔찍한 진실을 '하나도 남김없이 전부 다 털어놓고 말하다'.", cognates: "profess(공언하다), professor(교수)", group: "5. 자백과 의도" },

            { word: "deceive", meaning: "속이다, 기만하다", root: "de(아래로) + ceiv(잡다) → 달콤한 거짓말로 순진한 사람을 '구덩이 아래로(de) 밀어 떨어뜨려 함정에 빠뜨려 꽉 잡다(ceiv)'.", cognates: "receive(받다), perceive(인지하다)", group: "5. 자백과 의도" },

            // [6. 구동사 및 기타]
            { word: "get away with", meaning: "(나쁜 짓을 하고도) 처벌을 모면하다", root: "get(얻다) + away(멀리) + with(함께) → 훔친 금괴나 저지른 죄를(with) 내 품에 얻은 채(get) 경찰에 안 잡히고 저 '멀리 달아나버리다(away)'.", cognates: "get, away, with", group: "6. 구동사 및 복합어" },

            { word: "appeal", meaning: "항소하다, 호소하다; 매력", root: "ad(~로) + pel(밀다) → 1심 판결에 억울함을 품고, 더 높은 법관에게 내 간절한 주장을 강력하게 '밀어붙이며(pel) 도와달라고 호소하다'.", cognates: "compel(강요하다), repel(쫓아버리다)", group: "6. 구동사 및 복합어" },

            { word: "robber", meaning: "강도", root: "rob(강탈하다) + er(사람) → 길가는 사람을 칼로 위협하여 가방이나 옷(robe)을 통째로 '강압적으로 빼앗아가는 흉악한 범죄자'.", cognates: "robe(예복 - 옷을 빼앗던 것에서 유래)", group: "6. 구동사 및 복합어" }
        ]
    };

    let currentLesson = 21; // 기본 21강 설정
    let currentCardIndex = 0;
    let isFlipped = false;
    let currentFlatWordList = [];

    function setLesson(lessonNumber) {
        currentLesson = lessonNumber;
        currentCardIndex = 0;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.replace('text-purple-700', 'text-slate-500');
            btn.classList.replace('border-purple-600', 'border-transparent');
            btn.classList.remove('bg-purple-50');
        });
        const activeTab = document.getElementById(`tab-${lessonNumber}`);
        activeTab.classList.add('active');
        activeTab.classList.replace('text-slate-500', 'text-purple-700');
        activeTab.classList.replace('border-transparent', 'border-purple-600');
        activeTab.classList.add('bg-purple-50');

        renderList();
    }

    function renderList() {
        const listView = document.getElementById('listView');
        let htmlContent = '';
        
        const words = db[currentLesson];
        currentFlatWordList = words;

        // 그룹핑
        const groupedData = words.reduce((acc, word) => {
            if (!acc[word.group]) acc[word.group] = [];
            acc[word.group].push(word);
            return acc;
        }, {});

        // 모든 단어에 대해 절대적으로 고유한 ID를 부여하기 위한 카운터
        let absoluteCounter = 0;

        for (const [groupName, groupWords] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-6">
                    <h2 class="text-sm font-bold text-purple-700 uppercase tracking-wider mb-3 px-1"><i class="fa-solid fa-layer-group mr-2"></i>${groupName}</h2>
                    <div class="space-y-3">
            `;
            
            groupWords.forEach((item) => {
                // 어떤 상황에서도 겹치지 않는 고유 ID 생성
                const id = `word-${currentLesson}-${absoluteCounter++}`;
                
                htmlContent += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition" onclick="toggleAccordion('${id}')">
                            <div>
                                <h3 class="text-[1.1rem] font-bold text-slate-800">${item.word}</h3>
                                <p class="text-sm text-slate-500 mt-1 font-medium">${item.meaning}</p>
                            </div>
                            <div class="text-slate-400 w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-slate-50 px-5 border-t border-slate-100">
                            <div class="mb-4">
                                <span class="inline-block bg-purple-100 text-purple-800 text-[0.7rem] px-2 py-1 rounded-md font-bold mb-2 shadow-sm border border-purple-200">
                                    <i class="fa-solid fa-book-open mr-1"></i>어원의 비밀
                                </span>
                                <p class="text-[0.9rem] text-slate-700 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-2">
                                <span class="inline-block bg-sky-100 text-sky-800 text-[0.7rem] px-2 py-1 rounded-md font-bold mb-1 border border-sky-200">
                                    <i class="fa-solid fa-link mr-1"></i>동계어 (Family)
                                </span>
                                <p class="text-[0.85rem] text-slate-600 font-semibold">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-clone mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = currentFlatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = `${currentLesson}강 - ${item.group.substring(3)}`;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${currentFlatWordList.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : currentFlatWordList.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < currentFlatWordList.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    window.onload = () => {
        setLesson(21); // 초기 로드
    };
</script>
</body>
</html>
