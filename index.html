<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메타인지 어원 단어장 (17~18)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 앱 스타일 스크롤바 숨김 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 부드러운 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out, opacity 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 300px; opacity: 1; padding-top: 1rem; padding-bottom: 0.5rem; }
        
        /* 카드 뒤집기 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* 모바일 앱 컨테이너 제어 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-md rounded-b-xl">
        <div>
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-brain mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-indigo-200 mt-1">중등 고난도 17, 18 - 어원 학습법</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-white text-indigo-600 px-3 py-1.5 rounded-full text-sm font-semibold shadow-sm hover:bg-indigo-50 transition">
            <i class="fa-solid fa-clone mr-1"></i> 카드모드
        </button>
    </header>

    <!-- Main Content Area (List Mode) -->
    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
        <!-- 콘텐츠는 JavaScript로 렌더링됩니다 -->
    </main>

    <!-- Flashcard Mode (Hidden by default) -->
    <div id="flashcardView" class="hidden absolute inset-0 bg-gray-900 bg-opacity-95 z-30 flex-col pb-10">
        <!-- 헤더 -->
        <div class="flex justify-between items-center p-4 text-white">
            <span id="flashcardCounter" class="text-sm font-medium bg-gray-800 px-3 py-1 rounded-full border border-gray-700">1 / 60</span>
            <button onclick="toggleMode()" class="text-gray-300 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>

        <!-- 카드 영역 -->
        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[70vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 앞면 (단어) -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-4 border-indigo-50">
                    <span id="cardGroup" class="absolute top-6 text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-bold text-gray-800 mb-2 break-all">Word</h2>
                    <p class="text-gray-400 text-sm mt-4 animate-pulse"><i class="fa-solid fa-hand-pointer mr-1"></i> 탭하여 뜻/어원 보기</p>
                </div>

                <!-- 뒷면 (뜻, 어원, 동계어) -->
                <div class="absolute inset-0 w-full h-full bg-indigo-600 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-8 text-white overflow-y-auto">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-4 border-b border-indigo-400 pb-2">Word</h2>
                    <p id="cardMeaning" class="text-xl font-semibold mb-6">의미</p>
                    
                    <div class="bg-indigo-700 bg-opacity-50 rounded-xl p-4 mb-4">
                        <p class="text-xs text-indigo-200 mb-1 font-bold uppercase tracking-wider"><i class="fa-solid fa-seedling mr-1"></i> 어원 (Root)</p>
                        <p id="cardRoot" class="text-sm leading-relaxed">어원 설명</p>
                    </div>
                    
                    <div class="bg-indigo-700 bg-opacity-50 rounded-xl p-4">
                        <p class="text-xs text-indigo-200 mb-1 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Cognates)</p>
                        <p id="cardCognates" class="text-sm font-medium">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 네비게이션 컨트롤 -->
        <div class="flex justify-center items-center space-x-6 px-6">
            <button onclick="prevCard()" class="w-14 h-14 rounded-full bg-gray-800 text-white flex justify-center items-center active:bg-gray-700 hover:bg-gray-700 transition border border-gray-600 shadow-lg">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </button>
            <button onclick="nextCard()" class="w-14 h-14 rounded-full bg-indigo-600 text-white flex justify-center items-center active:bg-indigo-500 hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/30">
                <i class="fa-solid fa-chevron-right text-xl"></i>
            </button>
        </div>
    </div>

</div>

<script>
    // 전체 60개 단어 및 어원 데이터베이스
    const wordData = [
        // 그룹 1: 의학, 질병, 건강 (Medicine & Health)
        { word: "medical", meaning: "의학의, 의술의, 의료용의", root: "med(치료하다) + ical(형용사)", cognates: "medicine(약), remedy(치료법)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "dental", meaning: "치아의", root: "dent(치아) + al(형용사)", cognates: "dentist(치과의사), indent(들여쓰기)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "sanitary", meaning: "위생의, 위생적인, 깨끗한", root: "san(건강한) + itary(형용사)", cognates: "sane(제정신의), sanitation(위생 설비)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "immune", meaning: "면역의", root: "im(없는) + mun(의무/병)", cognates: "community(공동체), immunity(면역력)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "heal", meaning: "치유되다, 치료하다, 고치다", root: "고대 영어 hælan (온전하게 하다)", cognates: "health(건강), whole(전체의)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "recover", meaning: "회복하다, 되찾다", root: "re(다시) + cover(덮다/찾다) → 잃었던 것을 되찾다", cognates: "cover(덮다), discover(발견하다)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "tablet", meaning: "알약, 정제", root: "tabula(판) + et(작은) → 작고 납작한 약", cognates: "table(탁자), tabular(표의)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "allergy", meaning: "알레르기", root: "allos(다른) + ergon(작용) → 다르게 작용하는 이상 반응", cognates: "energy(에너지), synergy(시너지)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "prescribe", meaning: "처방하다", root: "pre(미리) + scrib(쓰다) → 약사에게 미리 약을 적어주다", cognates: "script(대본), describe(묘사하다)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "inject", meaning: "주사하다, 투여하다", root: "in(안으로) + ject(던지다) → 몸 안으로 약을 쏘아 넣다", cognates: "project(투영하다), reject(거절하다)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },
        { word: "infection", meaning: "감염, 전염(병)", root: "in(안에) + fect(만들다/오염시키다) + ion(명사)", cognates: "affect(영향을 미치다), perfect(완벽한)", group: "1. 의학, 질병, 건강 (-med-, -san-)" },

        // 그룹 2: 신체, 증상, 상처 (Body, Symptoms & Injury)
        { word: "symptom", meaning: "징후, 증상", root: "sym(함께) + ptom(떨어지다) → 질병과 함께 나타나는 현상", cognates: "asymptote(점근선)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "joint", meaning: "관절, 접합", root: "jungere(연결하다) → 뼈와 뼈를 잇는 부분", cognates: "join(합류하다), junction(교차로)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "spine", meaning: "척추, 등뼈", root: "spina(가시, 등뼈)", cognates: "spin(돌다), porcupine(호저)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "pulse", meaning: "맥박, 고동", root: "pellere(밀다/치다) → 피를 밀어내는 박동", cognates: "compel(강요하다), impulse(충동)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "sight", meaning: "시각, 시력", root: "고대 영어 sihth (보다)", cognates: "see(보다), sightsee(관광하다)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "digest", meaning: "소화하다", root: "di(따로) + ger(나르다) → 음식을 분해해서 보내다", cognates: "gesture(몸짓), suggest(제안하다)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "mental", meaning: "정신의, 심적인", root: "ment(마음) + al(형용사)", cognates: "mention(언급하다), memory(기억)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "wound", meaning: "상처, 부상; 상처입히다, 상하게 하다", root: "고대 영어 wund (상처)", cognates: "wind(감다 - 붕대를 감는 모습 연관)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "injure", meaning: "상처를 입히다, 다치게 하다", root: "in(아닌) + jur(법/올바름) → 올바르지 않게 해를 가하다", cognates: "justice(정의), jury(배심원)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "bruise", meaning: "멍, 타박상, 좌상; 타박상을 입히다", root: "briser(부수다) → 피부 밑 혈관이 부서진 것", cognates: "bristle(짧고 뻣뻣한 털)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "strain", meaning: "긴장, 큰 부담; 긴장시키다, (발목을) 접질리다", root: "stringere(팽팽하게 묶다)", cognates: "strict(엄격한), stress(스트레스)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "disabled", meaning: "장애를 입은, 장애의", root: "dis(반대/상실) + able(할 수 있는) + d", cognates: "ability(능력), enable(가능하게 하다)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },
        { word: "disorder", meaning: "장애[이상], 가벼운 병; 무질서, 혼란(상태)", root: "dis(부정) + order(순서/질서) → 신체 체계가 무너진 상태", cognates: "order(명령/질서), ordinary(평범한)", group: "2. 신체, 증상, 상처 (-ptom-, -ger-, -jur-)" },

        // 그룹 3: 농업, 자연, 물질 (Agriculture, Nature & Materials)
        { word: "agriculture", meaning: "농업", root: "agri(밭) + culture(경작)", cognates: "agrochemical(농약), cultivate(경작하다)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "cultivate", meaning: "경작하다, 재배하다", root: "cult(경작하다/돌보다) + ate(동사)", cognates: "culture(문화), colony(식민지)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "pasture", meaning: "목초지", root: "past(먹이다) + ure(명사) → 가축을 먹이는 땅", cognates: "pastor(목사), repast(식사)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "graze", meaning: "(가축이) 풀을 뜯어 먹다", root: "고대 영어 grasian (풀을 먹다)", cognates: "grass(풀)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "cattle", meaning: "소; 가축", root: "caput(머리, 재산) → 예전에는 가축이 주요 재산이었음", cognates: "capital(자본/수도), captain(선장)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "herd", meaning: "(가축의) 떼, 무리", root: "고대 영어 heord (동물의 무리)", cognates: "hoard(비축하다)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "pollution", meaning: "오염, 공해", root: "pol(더럽히다) + lut(씻다) + ion(명사)", cognates: "pollute(오염시키다)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "chemical", meaning: "화학 물질; 화학의, 화학적인", root: "chemia(연금술) + ical(형용사)", cognates: "alchemy(연금술), chemistry(화학)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "material", meaning: "물질, 재료; 물질적인, 세속적인", root: "mater(어머니, 근원) + ial(형용사)", cognates: "mother(어머니), matter(물질/문제)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },
        { word: "barrel", meaning: "배럴(약 159리터 단위); 통", root: "라틴어 barriclus (작은 통)", cognates: "bar(막대), barrier(장벽)", group: "3. 농업, 자연, 물질 (-agri-, -cult-, -mat-)" },

        // 그룹 4: 건설, 조립, 사업 (Construction, Assembly & Business)
        { word: "construct", meaning: "건설하다, 조립하다", root: "con(함께) + struct(세우다)", cognates: "structure(구조), destroy(파괴하다)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "assemble", meaning: "조립하다; 모으다", root: "ad(~로) + simul(함께) → 한곳으로 모으다", cognates: "similar(비슷한), simultaneous(동시의)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "concrete", meaning: "콘크리트; 구체적인; 콘크리트의", root: "con(함께) + cret(자라다) → 여러 재료가 뭉쳐 단단해진", cognates: "create(창조하다), increase(증가하다)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "crane", meaning: "기중기", root: "새 이름(두루미, 학)에서 유래 → 목이 긴 형태가 닮음", cognates: "cranberry(크랜베리 - 두루미가 먹는 열매)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "enterprise", meaning: "기업, 회사; (특히 모험적인) 사업", root: "enter(사이에) + pris(잡다) → 여러 사이에서 기회를 잡는 일", cognates: "surprise(놀라게 하다), prison(감옥)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "invest", meaning: "투자하다", root: "in(안에) + vest(옷을 입히다) → 돈을 어떤 곳에 입히다", cognates: "vest(조끼), divest(벗기다)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "export", meaning: "수출하다; 수출", root: "ex(밖으로) + port(나르다) → 항구 밖으로 내보내다", cognates: "import(수입하다), transport(수송하다)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "scale", meaning: "규모; 저울; 비늘", root: "라틴어 scala(사다리) 및 고대 노르드어(저울) 혼합", cognates: "escalator(에스컬레이터)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "provide", meaning: "공급하다(with); 준비하다(for, against)", root: "pro(앞을) + vid(보다) → 미리 앞을 내다보고 준비하다", cognates: "video(비디오), vision(시야)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },
        { word: "proportion", meaning: "비율", root: "pro(앞에) + port(나누다) → 알맞게 나누어진 몫", cognates: "part(부분), portion(몫)", group: "4. 건설, 사업, 경제 (-struct-, -port-)" },

        // 그룹 5: 변화, 상태, 평가 (Change, State & Assessment)
        { word: "expand", meaning: "확장하다; 팽창하다", root: "ex(밖으로) + pand(펼치다)", cognates: "span(기간/폭), compass(나침반)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "surpass", meaning: "초월하다, ~보다 낫다", root: "sur(위로/넘어서) + pass(지나가다)", cognates: "pass(통과하다), surface(표면)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "generate", meaning: "발생시키다", root: "gen(낳다, 종족) + ate(동사)", cognates: "gene(유전자), gentle(온화한)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "innovative", meaning: "획기적인, 혁신적인", root: "in(안으로) + nov(새로운) + ative(형용사)", cognates: "novel(소설/새로운), renovate(개조하다)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "enrich", meaning: "풍부하게 하다, 부유하게 하다", root: "en(~만들다) + rich(부유한)", cognates: "rich(부유한), reach(도달하다)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "worsen", meaning: "악화되다", root: "worse(더 나쁜) + en(동사화)", cognates: "bad(나쁜), worst(최악의)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "condition", meaning: "건강 상태, 컨디션; 상황, 조건", root: "con(함께) + dic(말하다) → 함께 합의된 상태나 조건", cognates: "dictate(받아쓰게 하다), dictionary(사전)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "emergency", meaning: "비상사태, 위급", root: "e(밖으로) + merg(잠기다/뜨다) → 갑자기 물 위로 떠오른 긴급상황", cognates: "merge(합병하다), emerge(나타나다)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "crisis", meaning: "위기", root: "krinein(결정하다) → 생사를 가르는 결정적 순간", cognates: "critic(비평가), crime(범죄)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "constant", meaning: "일정한, 지속적인", root: "con(함께/완전히) + stant(서 있는) → 항상 변함없이 서 있는", cognates: "stand(서다), state(상태/국가)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },
        { word: "optimistic", meaning: "낙관적인", root: "optimus(최고의) + istic(형용사) → 모든 것을 최고로 좋게 보는", cognates: "optimal(최적의), optimum(최고의 상태)", group: "5. 변화, 상태, 평가 (-pand-, -nov-)" },

        // 그룹 6: 구동사 (Phrasal Verbs)
        { word: "come down with", meaning: "~의 병에 걸리다", root: "come(오다) + down(아래로) + with(~와 함께) → 병과 함께 쓰러지다", cognates: "come, down, with", group: "6. 구동사 (Phrasal Verbs)" },
        { word: "ease off", meaning: "누그러지다, 완화되다[시키다]", root: "ease(편안해지다) + off(떨어져) → 긴장이나 고통이 떨어져 편안해지다", cognates: "easy(쉬운), disease(질병)", group: "6. 구동사 (Phrasal Verbs)" },
        { word: "shut down", meaning: "문을 닫다, 폐쇄하다", root: "shut(닫다) + down(아래로) → 셔터를 아래로 내려 완전히 닫다", cognates: "shut, down", group: "6. 구동사 (Phrasal Verbs)" },
        { word: "undertake", meaning: "떠맡다, 착수하다", root: "under(아래에) + take(취하다) → 책임을 짊어지기 위해 아래로 들어가 취하다", cognates: "take(잡다), overtake(추월하다)", group: "6. 구동사 (Phrasal Verbs)" },
        { word: "set up", meaning: "시작하다, 창설하다, 건립하다", root: "set(놓다) + up(위로) → 기둥을 위로 세워 기초를 잡다", cognates: "set, up, setup(설정)", group: "6. 구동사 (Phrasal Verbs)" }
    ];

    // 그룹별 데이터 정렬 구조화
    const groupedData = wordData.reduce((acc, word) => {
        if (!acc[word.group]) acc[word.group] = [];
        acc[word.group].push(word);
        return acc;
    }, {});

    // 플래시카드용 1차원 배열
    const flatWordList = [];
    Object.values(groupedData).forEach(group => flatWordList.push(...group));
    
    let currentCardIndex = 0;
    let isFlipped = false;

    // --- 초기화 및 리스트 렌더링 ---
    function initApp() {
        const listView = document.getElementById('listView');
        let htmlContent = '';

        for (const [groupName, words] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-6">
                    <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider mb-3 px-1"><i class="fa-solid fa-folder-tree mr-2"></i>${groupName}</h2>
                    <div class="space-y-3">
            `;
            
            words.forEach((item, index) => {
                // 고유 ID 생성
                const id = item.word.replace(/\s+/g, '-').toLowerCase();
                htmlContent += `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="toggleAccordion('${id}')">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${item.word}</h3>
                                <p class="text-sm text-gray-500 mt-1">${item.meaning}</p>
                            </div>
                            <div class="text-indigo-400">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-gray-50 px-4">
                            <div class="mb-3">
                                <span class="inline-block bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold mb-1">어원 분석</span>
                                <p class="text-sm text-gray-700 leading-relaxed">${item.root}</p>
                            </div>
                            <div class="pb-2">
                                <span class="inline-block bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded font-bold mb-1">동계어 (Family)</span>
                                <p class="text-sm text-gray-700 font-medium">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    // --- 아코디언 토글 로직 ---
    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    // --- 플래시카드 토글 모드 ---
    function toggleMode() {
        const listView = document.getElementById('listView');
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            // Show Flashcards
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            // Show List
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-clone mr-1"></i> 카드모드';
        }
    }

    // --- 플래시카드 업데이트 및 네비게이션 ---
    function updateFlashcard() {
        const item = flatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = item.group;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${flatWordList.length}`;
        
        // 카드 넘길 때 항상 앞면으로 리셋
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        if (currentCardIndex > 0) {
            currentCardIndex--;
            updateFlashcard();
        } else {
            // 처음이면 마지막으로 루프
            currentCardIndex = flatWordList.length - 1;
            updateFlashcard();
        }
    }

    function nextCard() {
        if (currentCardIndex < flatWordList.length - 1) {
            currentCardIndex++;
            updateFlashcard();
        } else {
            // 마지막이면 처음으로 루프
            currentCardIndex = 0;
            updateFlashcard();
        }
    }

    // 앱 실행
    window.onload = initApp;
</script>
</body>
</html>
