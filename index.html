                { word: "tray", meaning: "쟁반", etymology: "고대 영어 trieg(나무로 만든 얕은 그릇)에서 유래하여 음식이나 물건을 받쳐 들고 나르는 평평한 판.", cognates: "trayful (쟁반 하나 가득한 양)" },
                { word: "seasoning", meaning: "조미료, 양념", etymology: "season(계절, 시기를 맞추다)에서 유래. 음식을 가장 알맞은 때처럼 '맛이 최정상에 오르도록 가미하다'.", cognates: "season (양념하다, 계절)" },
                { word: "flavor", meaning: "(재료 특유의) 맛과 향; 풍미를 더하다(with)", etymology: "라틴어 flare(바람이 불다)에서 파생되어 입안 가득 향기가 퍼져 나가는 맛의 감각을 표현.", cognates: "flavorful (풍미가 좋은), flavoring (향료)" },
                { word: "scent", meaning: "향기", etymology: "라틴어 sentire(느끼다, 감지하다)에서 유래하여 사냥개들이 코로 냄새를 맡아 추적하는 유익한 향.", cognates: "scented (향기가 나는)" },
                { word: "leftover", meaning: "남은; 남은 음식", etymology: "left(남겨진) + over(이자나 잉여의). 식사 후 다 먹지 못하고 밀폐용기 등에 보관해 둔 음식물.", cognates: "leave (남겨두다, 떠나다)" },
                { word: "swallow", meaning: "삼키다; 삼키기", etymology: "고대 영어 swelgan(꿀꺽 삼키다, 흡수하다)에서 유래하여 음식물을 목구멍 뒤로 넘겨 위로 보내는 행위.", cognates: "swallowable (삼킬 수 있는)" },
                { word: "beverage", meaning: "음료", etymology: "라틴어 bibere(마시다)에서 유래하여 물을 제외하고 사람이 마실 수 있도록 가공된 모든 종류의 액체.", cognates: "brew (맥주 등을 양조하다)" },
                { word: "squeeze", meaning: "짜다, 압착하다", etymology: "고대 영어 cwiesan(짓누르다, 부수다)에서 강세형으로 변형됨. 사방에서 압력을 주어 즙을 내는 행위.", cognates: "squeezer (즙 짜는 기구)" },
                { word: "ripen", meaning: "익다; 익히다", etymology: "ripe(익은) + en(되다). 과일이나 곡식이 내외부적으로 성숙하여 먹기 좋은 최상의 상태가 되다.", cognates: "ripeness (숙성도, 익음)" },
                { word: "paste", meaning: "반죽; 풀; 붙이다", etymology: "그리스어 pastē(밀가루와 물을 섞어 만든 끈적한 죽)에서 유래하여 점성이 높은 부드러운 물질.", cognates: "pastry (페이스트리 과자류)" },
                { word: "blend", meaning: "섞다; 조화되다", etymology: "고대 노르드어 blanda(혼합하다)에서 유래하여 여러 성분이 경계 없이 자연스럽고 조화롭게 하나로 뭉침.", cognates: "blender (믹서기), blendable (섞이기 쉬운)" },
                { word: "go off", meaning: "(음식 등이) 상하다, 부패하다", etymology: "go(진행하다) + off(정상 궤도에서 이탈하여). 음식을 먹을 수 있는 신선한 상태를 벗어나 부패하다.", cognates: "off-flavor (변질된 맛)" },
                { word: "feed on", meaning: "~을 먹고 살다", etymology: "feed(먹이를 주다) + 의존 및 대상을 나타내는 전치사 on. 어떤 특정한 먹잇감이나 영양원을 주식으로 삼아 생명을 유지하다.", cognates: "food (음식), feeder (급여기)" }
            ],
            5: [
                { word: "uniform", meaning: "유니폼, 제복; 일정한, 균등한", etymology: "uni-(하나의) + form(형태). 모두가 '하나의 똑같은 형태'를 취하는 옷 또는 일관된 상태.", cognates: "uniformity (균일성), uniformly (균일하게)" },
                { word: "costume", meaning: "의상, 복장; 분장", etymology: "라틴어 consuetudo(관습, 관례)에서 유래. 특정 시대나 지역의 관습적이고 특별한 옷차림을 뜻함.", cognates: "custom (관습), customary (관습적인)" },
                { word: "collar", meaning: "깃, 칼라", etymology: "라틴어 collum(목)에서 유래하여 상의에서 목 부분을 둘러싸고 접혀 있는 부분이나 장식.", cognates: "collet (보석을 물리는 상자 자리)" },
                { word: "thread", meaning: "실; 실을 꿰다", etymology: "고대 영어 thrāwan(실을 비틀어 꼬다)에서 유래하여 천을 깁거나 옷을 짓는 데 쓰는 가느다란 가닥.", cognates: "thready (실 같은, 맥박이 약한)" },
                { word: "length", meaning: "길이, 기간", etymology: "long(긴) + 명사형 접미사 th. 물체의 한쪽 끝에서 다른 쪽 끝까지의 거리 또는 시간의 장단.", cognates: "lengthen (길게 하다), lengthy (지루하게 긴)" },
                { word: "casual", meaning: "격식을 차리지 않은, 평상복의; 우연의", etymology: "라틴어 casus(떨어지다, 우연히 일어나다)에서 유래. 계획 없이 우연히 일어나는 일, 혹은 편안한 복장.", cognates: "casually (편해 보이게, 우연히), casualty (사상자)" },
                { word: "fashion", meaning: "유행, 인기; 패션", etymology: "라틴어 facere(만들다)에서 유래하여 시대적으로 사람들이 만들어내고 따르는 지배적인 양식.", cognates: "fashionable (유행하는), fashionist (유행에 민감한 사람)" },
                { word: "loose", meaning: "헐거운, 느슨한; 풀린, 벗겨진", etymology: "고대 노르드어 loss(결박되지 않은)에서 유래하여 꽉 죄지 않고 공간의 여유가 있어 편안한 상태.", cognates: "loosen (느슨하게 하다), loosely (헐겁게)" },
                { word: "stripe", meaning: "줄무늬", etymology: "중세 네덜란드어 strīpe(선, 채찍 자국)에서 유래하여 바탕색과 다른 색으로 길게 그어진 평행선들.", cognates: "stripy (줄무늬가 많은)" },
                { word: "comfort", meaning: "편안함; 위로, 위안; 편하게 하다; 위로하다", etymology: "com-(함께/강조) + fortis(강하게 만들다). 슬프거나 힘든 사람의 마음을 지지하여 '함께 힘을 주어 강하게 세워주다'.", cognates: "comfortable (편안한), comforter (위로하는 자, 이불)" },
                { word: "fade", meaning: "(색이) 바래다, (색을) 바래게 하다", etymology: "라틴어 fatuus(맛이 없는, 흐릿한)에서 유래하여 빛이나 시간이 지나며 본연의 색조와 선명함을 잃다.", cognates: "fadeless (영원히 변치 않는)" },
                { word: "fold", meaning: "(종이·천 등을) 접다", etymology: "고대 영어 faldan(겹치다)에서 유래하여 평평한 물질의 한 부분을 다른 부분 위에 겹쳐 포개다.", cognates: "folder (서류철), unfold (펼치다)" },
                { word: "plain", meaning: "(의복 등이) 수수한; 무늬가 없는; 명백한, 분명한", etymology: "라틴어 planus(평평한, 탁 트인). 장식이 없어 복잡하지 않고 한눈에 '명백하게 잘 보이는'.", cognates: "plainly (명백하게, 솔직하게)" },
                { word: "premium", meaning: "고가의, 고급의; 할증금, 포상금", etymology: "pre-(앞에서) + emere(사다). 남들보다 앞서서 좋은 것을 사기 위해 '추가로 지불하는 최고급 가치'.", cognates: "premier (제일의, 수상)" },
                { word: "formal", meaning: "공식적인, 격식을 차린", etymology: "form(정해진 형태, 양식) + al. 사회적인 규칙이나 관례적 절차를 엄격히 준수하는 양식.", cognates: "formality (격식, 절차), formalize (공식화하다)" },
                { word: "fancy", meaning: "화려한, 장식적인; 값비싼", etymology: "fantasy(공상, 상상)의 축약형. 머릿속 상상을 현실에 화려하고 기발하게 장식물로 구현해 낸 것.", cognates: "fanciful (상상력이 풍부한)" },
                { word: "outfit", meaning: "(특별한 날 입는) 옷, 의상 한 벌", etymology: "out(밖으로) + fit(알맞게 장비를 갖추다). 특정 목적이나 외출을 위해 상하의 및 장신구를 갖춘 상태.", cognates: "outfitter (의류 유통업자)" },
                { word: "sew", meaning: "바느질하다, (바느질로) 만들다", etymology: "라틴어 suere(바느질하다)에서 유래하여 바늘과 실을 사용해 옷감을 이어 붙이거나 고정하는 작업.", cognates: "sewing (바느질), sewing-machine (재봉틀)" },
                { word: "alter", meaning: "변경하다, (옷을) 고쳐 만들다", etymology: "라틴어 alter(다른 것)에서 유래하여 기존의 상태나 옷의 치수를 '다르게 바꾸다'라는 의미.", cognates: "alteration (변경, 개조), alternative (대안)" },
                { word: "trousers", meaning: "바지", etymology: "게일어 triubhas(엉덩이와 다리를 감싸는 옷)에서 파생되어 두 다리를 따로 집어넣어 입는 하의.", cognates: "trouser (바지의 가닥)" },
                { word: "suit", meaning: "정장; 어울리다, 잘 맞다", etymology: "라틴어 sequi(따르다). 상의와 하의가 원단과 스타일 면에서 '서로 세트로 같이 따라다니다'에서 유래.", cognates: "suitable (적절한), suitor (소송인, 구혼자)" },
                { word: "vest", meaning: "조끼", etymology: "라틴어 vestis(옷, 의복)에서 유래하여 소매가 없고 재킷 안에 받쳐 입는 몸통만의 상의.", cognates: "vestment (제복, 의복), invest (권리를 부여하다, 투자하다)" },
                { word: "fabric", meaning: "천, 직물; 직물의 짜임새", etymology: "라틴어 fabrica(작업장, 구조물)에서 유래하여 실을 정교하게 짜 맞추어 만든 구조체나 옷감을 뜻함.", cognates: "fabricate (조작하다, 제작하다), fabrication (제작, 위조)" },
                { word: "cotton", meaning: "솜, 면화; 면직물, 무명실", etymology: "아랍어 quṭn(목화 고치)에서 스페인어와 프랑스어를 거쳐 유래한 식물성 천연 섬유의 대명사.", cognates: "cottony (솜털 같은)" },
                { word: "fur", meaning: "모피", etymology: "고대 프랑스어 forrer(칼집으로 감싸다, 안감을 대다)에서 유래하여 동물의 부드러운 털이 붙은 가죽.", cognates: "furry (털로 뒤덮인)" },
                { word: "laundry", meaning: "세탁물; 세탁소", etymology: "라틴어 lavandaria(물로 씻어내야 할 옷가지들)에서 유래하여 옷을 빨고 말리는 일련의 과정.", cognates: "launder (세탁하다), launderette (코인 세탁소)" },
                { word: "detergent", meaning: "세탁 세제, 세정제", etymology: "de-(멀리) + tergere(닦아내다). 옷감 사이에 박힌 때와 오염물질을 '깨끗하게 밀어내어 씻어내는 물질'.", cognates: "deterge (깨끗이 씻어내다)" },
                { word: "dress up", meaning: "옷을 갖춰[격식을 차려] 입다", etymology: "dress(올바르게 정돈하다) + 부사 up(완전히). 파티나 공식 석상에 맞춰 아주 단정하고 화려하게 입다.", cognates: "dressy (옷을 잘 입는)" },
                { word: "wear out", meaning: "많이 써서 낡게 하다, 닳다; 지치게 하다", etymology: "wear(입다, 마찰로 닳다) + out(소진하여 밖으로 폐기하다). 마찰로 물건의 수명이 다하거나 에너지를 다 쓰다.", cognates: "worn-out (닳아해진, 녹초가 된)" },
                { word: "show off", meaning: "~을 과시하다", etymology: "show(보여주다) + off(분리하여 도드라지게). 자기가 가진 장점이나 재산을 남들 앞에 돋보이도록 자랑하다.", cognates: "show-off (과시가 심한 사람)" }
            ]
        };

        let currentDay = 3;
        let currentMode = 'list';
        let cardIndex = 0;

        function switchDay(day) {
            currentDay = day;
            cardIndex = 0; // 데이 전환 시 인덱스 초기화
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-200');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeTab = document.getElementById(`tab-${day}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white');

            renderContent();
        }

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0; // 모드 전환 시 인덱스 초기화
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const footer = document.getElementById('app-footer');
            const data = vocabData[currentDay];

            if (currentMode === 'list') {
                footer.innerHTML = `© 얼룩말영어학원 | 스마트 단어 학습 시스템`;
                container.innerHTML = data.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = data[cardIndex];
                footer.innerHTML = `
                    <div class="flex justify-between items-center px-4 py-1">
                        <button onclick="prevCard()" class="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg ${cardIndex === 0 ? 'opacity-50 pointer-events-none' : ''}">이전</button>
                        <span class="font-semibold text-slate-600">${cardIndex + 1} / ${data.length}</span>
                        <button onclick="nextCard()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg ${cardIndex === data.length - 1 ? 'opacity-50 pointer-events-none' : ''}">다음</button>
                    </div>
                `;
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-4xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData[currentDay].length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Init Day 3
        switchDay(3);
    </script>
</body>
</html>
