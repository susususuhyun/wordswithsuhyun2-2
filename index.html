    function App() {
      const [selectedDay, setSelectedDay] = useState(4);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [bookmarked, setBookmarked] = useState(new Set());
      const [memorized, setMemorized] = useState(new Set());
      const [showMeaning, setShowMeaning] = useState(true);
      const [filterMode, setFilterMode] = useState("all"); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [speechRate, setSpeechRate] = useState(0.9);
      
      // Responsive layout tab controller: "list" or "card"
      const [mobileTab, setMobileTab] = useState("list");

      const autoPlayTimer = useRef(null);

      // Web Speech API Pronunciation
      const playPronunciation = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const cleanText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'en-US';
          utterance.rate = speechRate;
          window.speechSynthesis.speak(utterance);
        }
      };

      const playMeaning = (text) => {
        if ('speechSynthesis' in window) {
          const cleanText = text.replace(/[\(\)·\[\]~]/g, '');
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'ko-KR';
          utterance.rate = 1.0;
          window.speechSynthesis.speak(utterance);
        }
      };

      const handleNext = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev + 1) % filteredWords.length);
        setShowMeaning(true);
      };

      const handlePrev = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev - 1 + filteredWords.length) % filteredWords.length);
        setShowMeaning(true);
      };

      // Reset index safely when changing parameters
      useEffect(() => {
        setCurrentIndex(0);
        setShowMeaning(true);
      }, [selectedDay, filterMode, searchQuery]);

      // Key Listener for desktops
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
          if (e.key === "ArrowRight") {
            handleNext();
          } else if (e.key === "ArrowLeft") {
            handlePrev();
          } else if (e.key === " ") {
            e.preventDefault();
            setShowMeaning(prev => !prev);
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [currentIndex, filterMode, searchQuery, selectedDay, filteredWords]);

      // Processing Filtered Words
      const filteredWords = useMemo(() => {
        return WORDS_DATABASE.filter(item => {
          if (item.day !== selectedDay) return false;
          
          const matchesSearch = item.word.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.meaning.includes(searchQuery) ||
                                item.related.toLowerCase().includes(searchQuery.toLowerCase());
          if (!matchesSearch) return false;

          if (filterMode === "bookmarked") return bookmarked.has(item.id);
          if (filterMode === "not_memorized") return !memorized.has(item.id);
          return true;
        });
      }, [selectedDay, searchQuery, filterMode, bookmarked, memorized]);

      const currentWord = filteredWords[currentIndex] || filteredWords[0] || null;

      // Autoplay Loop Engine
      useEffect(() => {
        if (isPlaying && currentWord) {
          playPronunciation(currentWord.word);
          autoPlayTimer.current = setTimeout(() => {
            if (showMeaning) playMeaning(currentWord.meaning);
            autoPlayTimer.current = setTimeout(() => {
              handleNext();
            }, 3500);
          }, 2000);
        }
        return () => {
          if (autoPlayTimer.current) clearTimeout(autoPlayTimer.current);
        };
      }, [isPlaying, currentIndex, currentWord]);

      const toggleBookmark = (id) => {
        setBookmarked(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      const toggleMemorized = (id) => {
        setMemorized(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      return (
        <div class="h-screen flex flex-col bg-[#05070c] text-slate-100 overflow-hidden">
          
          {/* MOBILE VIEW TOGGLE TABS (Only visible on screens < md) */}
          <div class="md:hidden flex bg-[#090d16] border-b border-slate-800 p-2 gap-2 flex-shrink-0">
            <button 
              onClick={() => setMobileTab("list")}
              class={`flex-1 py-2.5 text-center text-xs font-bold rounded-xl transition-all ${mobileTab === "list" ? "bg-emerald-500 text-[#05070c] shadow-lg" : "bg-[#0f1524] text-slate-400 border border-slate-800"}`}
            >
              📋 단어 목록 ({filteredWords.length})
            </button>
            <button 
              onClick={() => {
                setMobileTab("card");
                setShowMeaning(true);
              }}
              class={`flex-1 py-2.5 text-center text-xs font-bold rounded-xl transition-all ${mobileTab === "card" ? "bg-emerald-500 text-[#05070c] shadow-lg" : "bg-[#0f1524] text-slate-400 border border-slate-800"}`}
            >
              🃏 카드 학습 하기
            </button>
          </div>

          <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
            
            {/* SIDEBAR: Hidden on Mobile unless mobileTab is 'list' */}
            <div class={`w-full md:w-80 flex-shrink-0 flex flex-col border-r border-slate-800 bg-[#0c101b] overflow-hidden ${mobileTab === 'list' ? 'flex h-full' : 'hidden md:flex'}`}>
              
              <div class="p-5 border-b border-slate-800 bg-[#090d16] relative">
                <div class="absolute inset-x-0 top-0 h-1 zebra-header"></div>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2.5 py-0.5 bg-emerald-500 text-[#05070c] font-black text-[10px] rounded tracking-widest uppercase">ZEBRA CORE</span>
                  <span class="text-xs text-emerald-400 font-mono">중등 고난도 [22개정]</span>
                </div>
                <h1 class="text-base font-extrabold text-slate-100 mt-2">중학고난도 4-5과 어원 단어장</h1>
                
                <div class="mt-4">
                  <div class="flex justify-between text-[11px] text-slate-400 mb-1">
                    <span>Day {selectedDay} 암기 진행도</span>
                    <span>
                      {Math.round((WORDS_DATABASE.filter(w => w.day === selectedDay && memorized.has(w.id)).length / WORDS_DATABASE.filter(w => w.day === selectedDay).length) * 100)}%
                    </span>
                  </div>
                  <div class="w-full h-1.5 bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                    <div 
                      class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full transition-all duration-300" 
                      style={{ width: `${(WORDS_DATABASE.filter(w => w.day === selectedDay && memorized.has(w.id)).length / WORDS_DATABASE.filter(w => w.day === selectedDay).length) * 100}%` }}
                    ></div>
                  </div>
                </div>
              </div>

              {/* Selector Buttons for Days 4-5 */}
              <div class="p-3 bg-slate-950/50 border-b border-slate-800">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest mb-1.5 block">Day 선택 (4-5)</label>
                <div class="grid grid-cols-2 gap-2">
                  {[4, 5].map(dayNum => (
                    <button
                      key={dayNum}
                      onClick={() => { setSelectedDay(dayNum); }}
                      class={`py-2 text-xs font-bold rounded-xl border transition-all ${selectedDay === dayNum ? "bg-emerald-500/15 border-emerald-500 text-emerald-300 shadow-md" : "border-slate-800 bg-[#0f1524] text-slate-400 hover:border-slate-700"}`}
                    >
                      Day {dayNum} (30단어)
                    </button>
                  ))}
                </div>
              </div>

              {/* Option Filters */}
              <div class="p-2.5 bg-[#0a0e18] border-b border-slate-800 grid grid-cols-3 gap-1">
                <button onClick={() => { setFilterMode("all"); }} class={`py-1 text-center text-[11px] rounded-lg font-medium transition-colors ${filterMode === "all" ? "bg-slate-800 text-emerald-400 font-bold" : "text-slate-500 hover:bg-slate-800/20"}`}>전체</button>
                <button onClick={() => { setFilterMode("bookmarked"); }} class={`py-1 text-center text-[11px] rounded-lg font-medium transition-colors flex items-center justify-center gap-1 ${filterMode === "bookmarked" ? "bg-slate-800 text-amber-400 font-bold" : "text-slate-500 hover:bg-slate-800/20"}`}>★ 북마크</button>
                <button onClick={() => { setFilterMode("not_memorized"); }} class={`py-1 text-center text-[11px] rounded-lg font-medium transition-colors ${filterMode === "not_memorized" ? "bg-slate-800 text-emerald-300 font-bold" : "text-slate-500 hover:bg-slate-800/20"}`}>미암기</button>
              </div>

              {/* Search Input */}
              <div class="p-3 bg-slate-950/20 relative">
                <input 
                  type="text" 
                  placeholder="단어, 뜻, 파생어 검색..." 
                  value={searchQuery}
                  onChange={(e) => { setSearchQuery(e.target.value); }}
                  class="w-full pl-8 pr-4 py-2 bg-[#090d16] border border-slate-800 rounded-xl text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition-colors"
                />
                <svg class="w-3.5 h-3.5 absolute left-6 top-5.5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>

              {/* Word List View */}
              <div class="flex-1 overflow-y-auto divide-y divide-slate-900 bg-[#080b12]">
                {filteredWords.length === 0 ? (
                  <div class="p-8 text-center text-xs text-slate-600">해당 단어가 없습니다.</div>
                ) : (
                  filteredWords.map((item, idx) => {
                    const isActive = currentWord && currentWord.id === item.id;
                    const wordIndex = WORDS_DATABASE.filter(w => w.day === selectedDay).indexOf(item) + 1;
                    return (
                      <div 
                        key={item.id}
                        onClick={() => { 
                          setCurrentIndex(idx); 
                          setShowMeaning(true); 
                          setMobileTab("card"); // Auto-switch on mobile so card is instantly visible!
                        }}
                        class={`p-3 text-left cursor-pointer transition-all flex items-center justify-between ${isActive ? "bg-emerald-950/20 border-l-4 border-emerald-500 pl-2" : "hover:bg-slate-800/10"}`}
                      >
                        <div class="min-w-0 pr-2">
                          <span class="text-[10px] font-mono text-slate-600 mr-1.5">#{wordIndex}</span>
                          <span class={`font-bold text-xs tracking-tight ${isActive ? "text-emerald-300" : "text-slate-300"}`}>{item.word}</span>
                          <p class="text-[11px] text-slate-500 truncate mt-0.5 pl-5">{item.meaning}</p>
                        </div>
                        <div class="flex items-center gap-1" onClick={e => e.stopPropagation()}>
                          <button onClick={() => toggleBookmark(item.id)} class={`p-1 text-xs ${bookmarked.has(item.id) ? "text-amber-400" : "text-slate-700"}`}>★</button>
                          <button onClick={() => toggleMemorized(item.id)} class={`p-1 text-xs ${memorized.has(item.id) ? "text-emerald-400" : "text-slate-700"}`}>✔</button>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            {/* MAIN STUDY CARDS PANEL: Hidden on Mobile unless mobileTab is 'card' */}
            <div class={`flex-1 flex flex-col bg-[#05070c] relative overflow-y-auto ${mobileTab === 'card' ? 'flex h-full' : 'hidden md:flex'}`}>
              
              <div class="p-4 bg-[#090d16] border-b border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <span class="text-xs font-mono font-bold text-emerald-400">Day {selectedDay}</span>
                  <span class="text-[10px] text-slate-600 font-mono">({currentIndex + 1} / {filteredWords.length || 0} Card)</span>
                </div>
                
                <div class="flex items-center gap-3">
                  <select 
                    value={speechRate} 
                    onChange={(e) => setSpeechRate(parseFloat(e.target.value))}
                    class="bg-[#0f1524] text-[10px] text-slate-300 rounded border border-slate-800 px-1 py-0.5 focus:outline-none"
                  >
                    <option value="0.7">0.7x (느리게)</option>
                    <option value="0.9">0.9x (보통)</option>
                    <option value="1.1">1.1x (빠르게)</option>
                  </select>
                  <button 
                    onClick={() => setIsPlaying(!isPlaying)}
                    class={`px-3 py-1.5 text-xs font-bold rounded-full flex items-center gap-1.5 transition-all ${isPlaying ? "bg-red-500 text-white shadow-md shadow-red-500/20" : "bg-emerald-500 text-[#05070c] hover:bg-emerald-400"}`}
                  >
                    {isPlaying ? "정지" : "▶ 자동 재생"}
                  </button>
                </div>
              </div>

              <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 max-w-2xl mx-auto w-full">
                {currentWord ? (
                  <div class="w-full flex flex-col gap-5">
                    
                    {/* Flip Card Section */}
                    <div onClick={() => setShowMeaning(prev => !prev)} class="perspective-1000 w-full cursor-pointer h-64 select-none active:scale-98 transition-transform duration-200">
                      <div class={`relative w-full h-full duration-500 preserve-3d transition-transform ${!showMeaning ? "rotate-y-180" : ""}`}>
                        
                        {/* CARD FRONT */}
                        <div class="absolute w-full h-full bg-[#0c101b] border border-slate-800 rounded-3xl flex flex-col justify-between p-6 shadow-2xl backface-hidden glow-emerald">
                          <div class="flex justify-between w-full">
                            <button onClick={(e) => { e.stopPropagation(); toggleBookmark(currentWord.id); }} class={`px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${bookmarked.has(currentWord.id) ? "border-amber-500/30 bg-amber-500/10 text-amber-400" : "border-slate-800 text-slate-500"}`}>
                              ★ {bookmarked.has(currentWord.id) ? "북마크됨" : "북마크"}
                            </button>
                            <span class="text-[10px] font-mono text-slate-600 font-bold uppercase tracking-wider">Word Card</span>
                          </div>
                          <div class="text-center">
                            <h2 class="text-3xl md:text-4xl font-black text-white tracking-tight select-all">{currentWord.word}</h2>
                            <p class="text-[11px] text-slate-500 mt-2">카드 클릭 또는 Space바로 한글 뜻을 뒤집어 확인하세요</p>
                          </div>
                          <div class="flex justify-center">
                            <button onClick={(e) => { e.stopPropagation(); playPronunciation(currentWord.word); }} class="p-2 rounded-full bg-[#131929] border border-slate-800 text-emerald-400 hover:bg-[#1b243b]">
                              🔊 발음 청취
                            </button>
                          </div>
                        </div>

                        {/* CARD BACK */}
                        <div class="absolute w-full h-full bg-[#0c101b] border border-emerald-500/30 rounded-3xl flex flex-col justify-between p-6 shadow-2xl backface-hidden rotate-y-180">
                          <div class="flex justify-between w-full">
                            <span class="text-[10px] font-mono text-emerald-500 font-bold uppercase tracking-wider">Meaning Card</span>
                            <button onClick={(e) => { e.stopPropagation(); toggleMemorized(currentWord.id); }} class={`px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${memorized.has(currentWord.id) ? "border-emerald-500/30 bg-emerald-500/10 text-emerald-400" : "border-slate-800 text-slate-500"}`}>
                              ✔ {memorized.has(currentWord.id) ? "암기 완료!" : "외웠음"}
                            </button>
                          </div>
                          <div class="text-center">
                            <p class="text-2xl md:text-3xl font-black text-emerald-400 tracking-tight leading-snug">{currentWord.meaning}</p>
                            <button onClick={(e) => { e.stopPropagation(); playMeaning(currentWord.meaning); }} class="text-[10px] text-slate-500 hover:text-slate-400 mt-2.5 inline-flex items-center gap-1">🔊 뜻 소리 듣기</button>
                          </div>
                          <div class="text-center text-[10px] text-slate-600">다시 누르면 영단어가 표시됩니다</div>
                        </div>

                      </div>
                    </div>

                    {/* ETYMOLOGY CARD (Always Pre-loaded, 100% Reliable Offline) */}
                    <div class="w-full bg-[#0c101b] border border-slate-800 rounded-3xl p-5 md:p-6 shadow-xl text-left">
                      <div class="flex items-center gap-2 mb-3.5">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-xs uppercase font-extrabold tracking-widest text-emerald-400">Zebra 프리미엄 오프라인 어원 가이드</span>
                      </div>

                      <div class="space-y-3.5 fade-in">
                        <div class="flex flex-wrap items-center gap-2 text-[11px] font-semibold">
                          <span class="px-2.5 py-0.5 bg-slate-900 rounded-lg text-slate-300 border border-slate-800">형태 구조: <b class="text-emerald-400 font-black">{currentWord.prefix}</b></span>
                          <span class="text-slate-700">+</span>
                          <span class="px-2.5 py-0.5 bg-slate-900 rounded-lg text-slate-300 border border-slate-800">기원어근: <b class="text-emerald-400 font-black">{currentWord.root}</b></span>
                        </div>

                        <p class="text-slate-300 text-xs md:text-[13px] leading-relaxed font-normal">
                          {currentWord.story}
                        </p>

                        <div class="pt-3 border-t border-slate-800/80">
                          <span class="text-[10px] font-extrabold text-amber-400 uppercase tracking-wider block mb-1">같은 어근 공유 단어 (Cognates)</span>
                          <div class="text-xs text-slate-300 font-medium tracking-tight bg-slate-950/40 p-2.5 rounded-xl border border-slate-900/60 leading-normal">
                            {currentWord.related}
                          </div>
                        </div>
                      </div>
                    </div>

                  </div>
                ) : (
                  <div class="text-center p-8 bg-[#0c101b] rounded-2xl border border-slate-800">
                    <p class="text-slate-400 mb-2">조건에 맞는 단어가 없습니다.</p>
                    <button onClick={() => { setFilterMode("all"); setSearchQuery(""); }} class="mt-2 text-xs text-emerald-400 font-semibold underline">필터 및 검색 초기화</button>
                  </div>
                )}
              </div>

              {/* Bottom Controllers */}
              <div class="p-5 bg-[#090d16] border-t border-slate-800/80 flex items-center justify-between mt-auto w-full">
                <button onClick={handlePrev} disabled={filteredWords.length <= 1} class="px-4 py-2 rounded-xl bg-[#0f1524] border border-slate-800 hover:border-slate-700 text-slate-200 text-xs font-semibold disabled:opacity-30 active:scale-95 transition-all">◀ 이전 카드</button>
                <div class="hidden sm:flex items-center gap-2 text-xs text-slate-600">
                  <span class="px-2 py-0.5 bg-slate-950 border border-slate-800 rounded font-mono">←</span>
                  <span class="px-2 py-0.5 bg-slate-950 border border-slate-800 rounded font-mono">→</span>
                  <span class="px-2 py-0.5 bg-slate-950 border border-slate-800 rounded font-mono">Space 바</span>
                </div>
                <button onClick={handleNext} disabled={filteredWords.length <= 1} class="px-4 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-[#05070c] text-xs font-bold disabled:opacity-30 active:scale-95 transition-all">다음 카드 ▶</button>
              </div>

            </div>

          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
