<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메타인지 단어장 (19강~20강)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 앱 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease, opacity 0.4s ease; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 500px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        /* 3D 카드 뒤집기 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* 탭 액티브 상태 스타일 (비즈니스 블루 톤) */
        .tab-btn.active { color: #1e40af; border-bottom-color: #1e40af; font-weight: 700; background-color: #dbeafe; }

        /* 앱 컨테이너 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <!-- 상단 헤더 (네이비 톤) -->
    <header class="bg-slate-800 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight"><i class="fa-solid fa-scale-balanced mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-slate-300 mt-1 font-medium">19강(경제) & 20강(정치)</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md hover:bg-blue-500 transition transform active:scale-95">
            <i class="fa-solid fa-layer-group mr-1"></i> 카드모드
        </button>
    </header>

    <!-- 탭 내비게이션 (19강, 20강 분리) -->
    <div class="flex bg-white shadow-sm sticky top-[72px] z-10 border-b border-slate-200">
        <button id="tab-19" onclick="setLesson(19)" class="tab-btn active flex-1 py-3.5 text-sm text-slate-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-chart-line mr-1"></i> 19강 (경제·금융)</button>
        <button id="tab-20" onclick="setLesson(20)" class="tab-btn flex-1 py-3.5 text-sm text-slate-500 border-b-2 border-transparent transition duration-200"><i class="fa-landmark fa-solid mr-1"></i> 20강 (정치·논쟁)</button>
    </div>

    <!-- 리스트 뷰 -->
    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24 bg-slate-50">
        <!-- JS로 동적 렌더링 -->
    </main>

    <!-- 플래시카드 뷰 (기본 숨김) -->
    <div id="flashcardView" class="hidden absolute inset-0 bg-slate-900 bg-opacity-95 z-30 flex-col pb-10">
        <div class="flex justify-between items-center p-5 text-white">
            <span id="flashcardCounter" class="text-sm font-bold bg-slate-800 px-4 py-1.5 rounded-full border border-slate-600 shadow-inner">1 / 30</span>
            <button onclick="toggleMode()" class="text-slate-400 hover:text-white transition transform hover:rotate-90"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>

        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[65vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 플래시카드 앞면 -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-b-8 border-blue-500">
                    <span id="cardGroup" class="absolute top-6 text-xs font-bold text-blue-800 bg-blue-100 px-3 py-1 rounded-full border border-blue-200">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-black text-slate-800 mb-4 tracking-tight break-words">Word</h2>
                    <p class="text-slate-400 text-sm mt-6 font-medium animate-pulse"><i class="fa-solid fa-hand-pointer mr-2"></i>카드를 눌러 뒤집기</p>
                </div>

                <!-- 플래시카드 뒷면 -->
                <div class="absolute inset-0 w-full h-full bg-slate-800 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-6 text-white overflow-y-auto border-b-8 border-slate-950">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-2 border-b border-slate-600 pb-2 text-blue-300">Word</h2>
                    <p id="cardMeaning" class="text-2xl font-black mb-5 text-white">의미</p>
                    
                    <div class="bg-slate-700 rounded-xl p-4 mb-4 shadow-inner">
                        <p class="text-[0.7rem] text-blue-300 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-book-open mr-1"></i> 어원 스토리 (Semantic Shift)</p>
                        <p id="cardRoot" class="text-sm leading-relaxed text-slate-100 font-medium">어원 설명</p>
                    </div>
                    
                    <div class="bg-slate-700 rounded-xl p-4 shadow-inner">
                        <p class="text-[0.7rem] text-emerald-300 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Family)</p>
                        <p id="cardCognates" class="text-sm font-bold text-emerald-100">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 좌우 네비게이션 버튼 -->
        <div class="flex justify-center items-center space-x-8 px-6 pb-4">
            <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-slate-700 text-white flex justify-center items-center active:bg-slate-600 hover:bg-slate-600 transition transform active:scale-90 border border-slate-500 shadow-xl">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
            <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-blue-600 text-white flex justify-center items-center active:bg-blue-500 hover:bg-blue-500 transition transform active:scale-90 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                <i class="fa-solid fa-chevron-right text-2xl"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const db = {
        // ----------------- [ 19강: 경제, 금융 (30단어) ] -----------------
        19: [
            // 그룹 1: 재산과 자본 (-cap-, -asset-, -prop-)
            { word: "asset", meaning: "자산, 재산", root: "ad(충분히) + satis(충분한) → 빚을 모두 갚고도 남을 만큼 '충분히' 가지고 있는 것에서 유래하여 개인이나 회사의 귀중한 '자산'을 뜻하게 되었습니다.", cognates: "satisfy(만족시키다), saturate(흠뻑 적시다)", group: "1. 재산과 자본 (-cap-, -prop-)" },
            { word: "stock", meaning: "주식, 주; 재고(품)", root: "나무의 '기둥, 그루터기'라는 뜻에서 유래했습니다. 나무 기둥이 자산의 든든한 뼈대가 되듯, 회사의 뼈대가 되는 '주식' 또는 창고에 뼈대처럼 쌓인 '재고'를 뜻합니다.", cognates: "stalk(줄기, 대)", group: "1. 재산과 자본 (-cap-, -prop-)" },
            { word: "property", meaning: "재산, 소유물; 부동산, 토지", root: "propri(자신의 것) + ty → 남과 공유하는 것이 아니라, 오직 나 자신에게만 온전히 속해 있는 개인 소유의 물건이나 부동산을 뜻합니다.", cognates: "proper(적절한), appropriate(적절한, 도용하다)", group: "1. 재산과 자본 (-cap-, -prop-)" },
            { word: "fortune", meaning: "재산, 부; 행운", root: "라틴어 fortuna(행운의 여신) → 로마 신화의 운명의 여신이 수레바퀴를 굴리며 변덕스럽게 가져다주는 '행운', 또는 그 행운으로 얻은 막대한 '재산'.", cognates: "fortunate(운이 좋은)", group: "1. 재산과 자본 (-cap-, -prop-)" },
            { word: "capital", meaning: "자본; 수도; 대문자; 주요한", root: "caput(머리) + al → 사람의 몸에서 머리가 가장 중요하듯, 나라의 머리인 '수도', 사업을 시작할 때 가장 으뜸이 되는 밑천인 '자본'입니다.", cognates: "captain(선장), cap(모자)", group: "1. 재산과 자본 (-cap-, -prop-)" },
            { word: "budget", meaning: "예산, 예산안", root: "라틴어 bulga(가죽 주머니) → 옛날 영국의 재무장관이 국가의 돈과 장부를 넣어 다니던 '작은 가죽 가방'을 열던 것에서 국가의 '예산'이라는 뜻이 나왔습니다.", cognates: "bulge(불룩하다)", group: "1. 재산과 자본 (-cap-, -prop-)" },

            // 그룹 2: 지출과 소득 (-pend-, -come-)
            { word: "expense", meaning: "지출, 비용, 경비", root: "ex(밖으로) + pend(매달다, 저울을 달다) → 예전에는 화폐 대신 은의 무게를 저울에 달아서 지불했기에, 내 지갑 밖으로 저울을 달아 빠져나간 '비용'.", cognates: "expend(쏟다, 들이다), expensive(비싼)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "income", meaning: "수입, 소득", root: "in(안으로) + come(오다) → 일을 한 대가로 내 지갑이나 은행 통장 '안으로 들어오는(come in)' 돈, 즉 수입입니다.", cognates: "outcome(결과)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "pay off", meaning: "(빚 등을) 다 갚다; 성공하다, 성과를 올리다", root: "pay(지불하다) + off(떨어져, 완전히) → 남은 빚을 '완전히' 다 갚아서 털어내거나, 오랫동안 노력한 것이 마침내 열매를 맺어 큰 보상을 얻는 것.", cognates: "pay(지불하다)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "finance", meaning: "재정, 재무", root: "fin(끝내다) + ance → 밀려있는 빚이나 세금을 돈으로 모두 지불하여 채무 관계를 깔끔하게 '끝내다'에서 유래한 '재정, 재무'입니다.", cognates: "final(마지막의), finish(끝내다)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "loan", meaning: "대출(금), 대여", root: "고대 노르드어 lán(빌려줌) → 누군가에게 대가 없이, 혹은 이자를 받기로 약속하고 임시로 물건이나 돈을 '빌려주는 행위'입니다.", cognates: "lend(빌려주다)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "account", meaning: "거래, 예금 계좌; 계산, 회계", root: "ad(~로) + computare(계산하다) → 은행에 돈이 들어오고 나가는 것을 장부에 꼼꼼히 '계산해서' 적어둔 거래 내역이나 개인의 계좌.", cognates: "count(세다), computer(컴퓨터)", group: "2. 지출과 소득 (-pend-, -come-)" },

            // 그룹 3: 경제의 흐름과 통화 (-eco-, -cur-)
            { word: "economic", meaning: "경제학의, 경제(상)의", root: "oikos(집) + nomos(관리하다) → 원래 한 집안의 살림살이를 알뜰하게 꾸려나가던 것에서, 현대에 와서 국가 전체의 '경제'를 뜻하게 됨.", cognates: "economy(경제), ecology(생태학)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "commerce", meaning: "상업, 통상, 교섭", root: "com(함께) + merc(장사하다) → 여러 상인들이 시장이나 항구에 '함께' 모여 대규모로 물건을 사고파는 활발한 '상업' 거래.", cognates: "merchant(상인), market(시장)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "currency", meaning: "통화, 화폐; 유통", root: "cur(흐르다) + ency → 멈춰있는 것이 아니라 강물이 막힘없이 굽이쳐 흐르듯, 여러 사람들 사이의 손을 돌고 돌며 '유통되는' 돈.", cognates: "current(현재의, 흐름), occur(발생하다)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "temporary", meaning: "일시적인, 임시의", root: "temp(시간) + orary → 영구적으로 영원히 계속되는 것이 아니라, 한정되고 정해진 찰나의 '시간' 동안만 짤막하게 존재하는 상태.", cognates: "tempo(속도), contemporary(동시대의)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "annual", meaning: "1년의, 해마다의", root: "ann(1년) + ual → 태양이 365일마다 한 바퀴를 돌아 정확히 제자리로 오듯 '1년마다' 정기적으로 열리거나 주어지는.", cognates: "anniversary(기념일)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },

            // 그룹 4: 가치 평가와 전략 (-val-, -neg-)
            { word: "estimate", meaning: "평가하다, 견적하다; 평가, 견적", root: "aes(구리, 돈) + timare(가치를 매기다) → 예전에 구리 동전이 얼마나 있는지 눈으로 어림잡아 보고 돈의 가치를 '계산하고 견적 내다'.", cognates: "esteem(존경하다, 높이 평가하다)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },
            { word: "negotiate", meaning: "협상하다", root: "neg(아니다) + otium(휴식) → 돈을 버느라 휴식할 틈도 없이 바쁘게 이익을 따지며 상인들이 거래처와 치열하게 '협상하다'.", cognates: "negate(부인하다), negative(부정적인)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },
            { word: "strategy", meaning: "전략, 계획", root: "stratos(군대) + agein(이끌다) → 고대 그리스에서 장군이 적군의 군대를 이기고 전쟁을 승리로 이끌기 위해 철저하게 짜내는 '전략'.", cognates: "strategic(전략적인)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },
            { word: "potential", meaning: "잠재적인, 발전 가능성이 있는", root: "pot(힘, 권력) + ential → 겉으로는 조용해서 잘 안 보이지만, 속에는 언제든 터져 나올 수 있는 막강한 '힘과 발전 가능성'을 품고 있는.", cognates: "potent(강력한), power(힘)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },
            { word: "risk", meaning: "위험, 모험", root: "라틴어 riscare(절벽을 항해하다) → 눈에 보이지 않는 뾰족한 암초가 숨어있는 바다를 향해 배를 모는 아슬아슬하고 '위험한' 투자나 모험.", cognates: "risky(위험한)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },

            // 그룹 5: 경제적 상승과 하락 (변화)
            { word: "decline", meaning: "(가격) 하락; (가치가) 하락하다", root: "de(아래로) + clin(기울다) → 평평하던 길이나 산비탈이 갑자기 아래로 푹 꺼지듯 가격이나 회사의 가치가 바닥을 향해 꺾여 내려가는 모습.", cognates: "incline(기울이다), recline(비스듬히 기대다)", group: "5. 경제적 상승과 하락" },
            { word: "boost", meaning: "증대하다; 경기 부양, 가격의 상승", root: "오래전 '소의 엉덩이를 뒤에서 밀어 올리다'라는 뜻에서 출발. 누군가 뒤에서 강력하게 팍 밀어주어 경기나 가격을 위로 솟구치게 띄우는 것.", cognates: "booster(촉진제)", group: "5. 경제적 상승과 하락" },
            { word: "collapse", meaning: "붕괴되다, 무너지다, 폭락하다; 붕괴, 실패", root: "col(함께) + laps(미끄러지다) → 멀쩡하던 건물의 기둥들이 한꺼번에 우르르 '미끄러져' 바닥으로 주저앉으며 완전히 '폭락하고 붕괴하다'.", cognates: "lapse(경과, 소멸), relapse(재발하다)", group: "5. 경제적 상승과 하락" },
            { word: "outcome", meaning: "결과, (구체적인) 성과", root: "out(밖으로) + come(오다) → 공장의 여러 제작 과정이 다 끝나고 최종적으로 문 밖으로 완성되어 걸어 나온 구체적인 '결과물'.", cognates: "come(오다)", group: "5. 경제적 상승과 하락" },
            { word: "lay off", meaning: "~을 해고하다", root: "lay(놓다) + off(떨어져서) → 원래 열심히 일하던 자리에서 억지로 도구를 '내려놓게' 하고 회사에서 멀리 떨어지게 하여 영원히 쉬게 하는 '해고'.", cognates: "layer(층), off(분리)", group: "5. 경제적 상승과 하락" },

            btn.classList.replace('border-blue-800', 'border-transparent');
            btn.classList.remove('bg-blue-100');

        activeTab.classList.replace('text-slate-500', 'text-blue-800');

                                    <i class="fa-solid fa-book-open mr-1.5"></i>어원 스토리 (Semantic Shift)
                                </span>
                                <p class="text-[0.9rem] text-slate-700 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-3">
                                <span class="inline-flex items-center bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs px-2.5 py-1 rounded-md font-bold mb-2">
                                    <i class="fa-solid fa-link mr-1.5"></i>동계어 (Family)
                                </span>
                                <p class="text-sm text-slate-600 font-bold">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    // 아코디언 토글 애니메이션
    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-layer-group mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = currentFlatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = `${currentLesson}강 - ${item.group.substring(3)}`; // 번호 제거
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${currentFlatWordList.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : currentFlatWordList.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < currentFlatWordList.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    // 앱 초기 실행
    window.onload = () => {
        setLesson(19); // 19강 기본 시작
    };
</script>
</body>
</html>
