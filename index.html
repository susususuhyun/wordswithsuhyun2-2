<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메타인지 어원 단어장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 앱 스타일 스크롤바 숨김 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 부드러운 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out, opacity 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 300px; opacity: 1; padding-top: 1rem; padding-bottom: 0.5rem; }
        
        /* 카드 뒤집기 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* 모바일 앱 컨테이너 제어 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-md rounded-b-xl">
        <div>
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-brain mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-indigo-200 mt-1">중등 고난도 16 - 어원 학습법</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-white text-indigo-600 px-3 py-1.5 rounded-full text-sm font-semibold shadow-sm hover:bg-indigo-50 transition">
            <i class="fa-solid fa-clone mr-1"></i> 카드모드
        </button>
    </header>

    <!-- Main Content Area (List Mode) -->
    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
        <!-- 콘텐츠는 JavaScript로 렌더링됩니다 -->
    </main>

    <!-- Flashcard Mode (Hidden by default) -->
    <div id="flashcardView" class="hidden absolute inset-0 bg-gray-900 bg-opacity-95 z-30 flex-col pb-10">
        <!-- 헤더 -->
        <div class="flex justify-between items-center p-4 text-white">
            <span id="flashcardCounter" class="text-sm font-medium bg-gray-800 px-3 py-1 rounded-full border border-gray-700">1 / 30</span>
            <button onclick="toggleMode()" class="text-gray-300 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>

        <!-- 카드 영역 -->
        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[70vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 앞면 (단어) -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-4 border-indigo-50">
                    <span id="cardGroup" class="absolute top-6 text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-bold text-gray-800 mb-2">Word</h2>
                    <p class="text-gray-400 text-sm mt-4 animate-pulse"><i class="fa-solid fa-hand-pointer mr-1"></i> 탭하여 뜻/어원 보기</p>
                </div>

                <!-- 뒷면 (뜻, 어원, 동계어) -->
                <div class="absolute inset-0 w-full h-full bg-indigo-600 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-8 text-white overflow-y-auto">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-4 border-b border-indigo-400 pb-2">Word</h2>
                    <p id="cardMeaning" class="text-xl font-semibold mb-6">의미</p>
                    
                    <div class="bg-indigo-700 bg-opacity-50 rounded-xl p-4 mb-4">
                        <p class="text-xs text-indigo-200 mb-1 font-bold uppercase tracking-wider"><i class="fa-solid fa-seedling mr-1"></i> 어원 (Root)</p>
                        <p id="cardRoot" class="text-sm leading-relaxed">어원 설명</p>
                    </div>
                    
                    <div class="bg-indigo-700 bg-opacity-50 rounded-xl p-4">
                        <p class="text-xs text-indigo-200 mb-1 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Cognates)</p>
                        <p id="cardCognates" class="text-sm font-medium">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 네비게이션 컨트롤 -->
        <div class="flex justify-center items-center space-x-6 px-6">
            <button onclick="prevCard()" class="w-14 h-14 rounded-full bg-gray-800 text-white flex justify-center items-center active:bg-gray-700 hover:bg-gray-700 transition border border-gray-600 shadow-lg">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </button>
            <button onclick="nextCard()" class="w-14 h-14 rounded-full bg-indigo-600 text-white flex justify-center items-center active:bg-indigo-500 hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/30">
                <i class="fa-solid fa-chevron-right text-xl"></i>
            </button>
        </div>
    </div>

</div>

<script>
    // 전체 30개 단어 및 어원 데이터베이스
    const wordData = [
        // 그룹 1: 이끌다, 향하다 (Lead & Direct)
        { word: "conduct", meaning: "지휘하다; 행동하다, 실시하다; 지휘; 행동", root: "con(함께) + duct(이끌다) → 함께 이끌다", cognates: "educate(교육하다), product(생산품)", group: "1. 이끌다, 향하다 (-duct-, -rect-)" },
        { word: "director", meaning: "감독, 연출자, 지도자", root: "di(멀리) + rect(똑바로) + or(~사람) → 올바르게 향하도록 이끄는 사람", cognates: "direct(직접의), correct(정확한)", group: "1. 이끌다, 향하다 (-duct-, -rect-)" },
        { word: "version", meaning: "번역, 번역서; 각색, 개작", root: "vers(돌다) + ion(명사) → 방향을 돌려 바꾼 형태", cognates: "reverse(반대의), universe(우주)", group: "1. 이끌다, 향하다 (-duct-, -rect-)" },

        // 그룹 2: 엮다, 두다, 분리하다 (Structure & Place)
        { word: "compose", meaning: "작곡하다, 작문하다; 구성하다; 가라앉히다", root: "com(함께) + pose(두다) → 함께 모아 두다", cognates: "position(위치), deposit(예금하다)", group: "2. 엮다, 두다, 공간 (-pos-, -text-, -val-)" },
        { word: "context", meaning: "문맥, 전후 관계; 정황, 주변 상황", root: "con(함께) + text(짜다/엮다) → 함께 엮인 것", cognates: "text(글), textile(직물)", group: "2. 엮다, 두다, 공간 (-pos-, -text-, -val-)" },
        { word: "distinct", meaning: "다른, 별개의; 뚜렷한", root: "dis(분리하여) + stinct(찌르다) → 찔러서 구별해 놓은", cognates: "instinct(본능), extinguish(불을 끄다)", group: "2. 엮다, 두다, 공간 (-pos-, -text-, -val-)" },
        { word: "interval", meaning: "(연극·연주 등의) 막간, 휴식 시간; 간격", root: "inter(~사이에) + val(벽) → 두 장벽 사이의 공간/시간", cognates: "wall(벽 - val과 어원 공유)", group: "2. 엮다, 두다, 공간 (-pos-, -text-, -val-)" },
        { word: "exhibit", meaning: "전시하다, 전시회를 열다; 전시, 전람", root: "ex(밖으로) + hibit(가지다/두다) → 밖으로 내어 두다", cognates: "habit(습관), prohibit(금지하다)", group: "2. 엮다, 두다, 공간 (-pos-, -text-, -val-)" },

        // 그룹 3: 말하다, 소리 (Speak & Sound)
        { word: "exclaim", meaning: "(감동하여) 외치다", root: "ex(밖으로) + claim(외치다) → 밖으로 크게 소리치다", cognates: "claim(주장하다), proclaim(선언하다)", group: "3. 말하다, 소리 (-claim-, -log-, tone)" },
        { word: "monologue", meaning: "(극의) 독백", root: "mono(하나) + logue(말하다) → 혼자 말하기", cognates: "dialogue(대화), logic(논리)", group: "3. 말하다, 소리 (-claim-, -log-, tone)" },
        { word: "chorus", meaning: "합창, 합창곡; 합창단", root: "그리스어 khoros (춤, 합창)에서 유래", cognates: "choir(성가대), choreograph(안무를 짜다)", group: "3. 말하다, 소리 (-claim-, -log-, tone)" },
        { word: "tone", meaning: "어조; 음색, 음조", root: "그리스어 tonos (잡아당기다, 팽팽함 → 현의 음높이)", cognates: "intonation(억양), tune(곡조)", group: "3. 말하다, 소리 (-claim-, -log-, tone)" },
        { word: "tune", meaning: "조율하다, 프로그램에 맞추다; 곡조, 가락", root: "tone의 변형 (음조, 가락)", cognates: "tone(어조), attune(조율하다)", group: "3. 말하다, 소리 (-claim-, -log-, tone)" },

        // 그룹 4: 가치, 전달, 기록 (Value & Record)
        { word: "appreciate", meaning: "감상하다, 평가하다; 감사하다", root: "ad(~에) + preci(가치/가격) + ate(동사) → 가치를 매기다", cognates: "price(가격), precious(귀중한)", group: "4. 가치, 전달, 글 (-preci-, -dit-, -liter-)" },
        { word: "tradition", meaning: "전통, 관례", root: "trans(건너서) + dit(주다) + ion(명사) → 세대를 건너 전해 주는 것", cognates: "edit(편집하다), render(주다)", group: "4. 가치, 전달, 글 (-preci-, -dit-, -liter-)" },
        { word: "literature", meaning: "문학", root: "liter(글자) + ature(명사)", cognates: "literal(문자 그대로의), letter(편지)", group: "4. 가치, 전달, 글 (-preci-, -dit-, -liter-)" },
        { word: "copyright", meaning: "판권, 저작권; 저작권이 있는; 저작권을 취득하다", root: "copy(복사/풍부함) + right(권리)", cognates: "copious(방대한) - 라틴어 copia(풍부함)에서 유래", group: "4. 가치, 전달, 글 (-preci-, -dit-, -liter-)" },

        // 그룹 5: 창조, 기교, 모방 (Create, Skill & Imitate)
        { word: "creature", meaning: "생물, 창조물; 동물", root: "crea(창조하다) + ture(명사)", cognates: "create(창조하다), recreation(오락)", group: "5. 창조, 모방 (-crea-, -sculp-, -im-)" },
        { word: "sculpture", meaning: "조각(술); 조각하다", root: "sculp(조각하다) + ture(명사)", cognates: "sculptor(조각가)", group: "5. 창조, 모방 (-crea-, -sculp-, -im-)" },
        { word: "craft", meaning: "공예(품), 기교, 기술", root: "고대 영어 cræft (힘, 기술)", cognates: "crafty(교활한), craftsman(장인)", group: "5. 창조, 모방 (-crea-, -sculp-, -im-)" },
        { word: "imitate", meaning: "모방하다; 모조하다, 모사하다", root: "im(모방하다) + itate(동사)", cognates: "image(이미지), imagine(상상하다)", group: "5. 창조, 모방 (-crea-, -sculp-, -im-)" },
        { word: "rehearse", meaning: "(연극·연설·음악의) 예행연습을 하다", root: "re(다시) + hearse(써레질하다) → 밭을 다시 갈듯 반복하다", cognates: "hearse(영구차 - 써레 모양에서 유래)", group: "5. 창조, 모방 (-crea-, -sculp-, -im-)" },

        // 그룹 6: 예술, 계급, 특성 (Art & Class)
        { word: "classic", meaning: "(예술품이) 일류의, 고전의; 일류 작가, 일류 작품", root: "class(계급, 함대) + ic(형용사) → 최고 계급의", cognates: "class(학급, 계급), classify(분류하다)", group: "6. 뛰어남, 극 (-class-, master, tragedy)" },
        { word: "masterpiece", meaning: "걸작, 명작", root: "master(거장/뛰어난) + piece(작품)", cognates: "master(주인), magnitude(거대함 - magister 어원)", group: "6. 뛰어남, 극 (-class-, master, tragedy)" },
        { word: "theme", meaning: "주제, 테마", root: "그리스어 thema (놓인 것, 주제)", cognates: "thesis(논문), anathema(저주)", group: "6. 뛰어남, 극 (-class-, master, tragedy)" },
        { word: "tragedy", meaning: "비극(작품); 재난, 참사", root: "tragos(염소) + oide(노래) → 염소의 노래(제전)", cognates: "tragic(비극의), comedy(희극 - oide 노래 어원 공유)", group: "6. 뛰어남, 극 (-class-, master, tragedy)" },
        { word: "noble", meaning: "고귀한, 고상한; 귀족의; 귀족", root: "no/gno(알다) + ble(할 수 있는) → 널리 알려진, 명망 있는", cognates: "know(알다), recognize(알아보다)", group: "6. 뛰어남, 극 (-class-, master, tragedy)" },

        // 그룹 7: 구동사 (Phrasal Verbs)
        { word: "be into", meaning: "~에 푹 빠져 있다, ~에 관심이 많다", root: "be(상태) + into(~안으로 향하는) → 마음이 쏠린 상태", cognates: "in, to, into", group: "7. 구동사 (Phrasal Verbs)" },
        { word: "live up to", meaning: "(다른 사람의 기대에) 부응하다", root: "live(살다) + up(위로/완전히) + to(~에) → 기대치까지 다다르게 살다", cognates: "live, up, to", group: "7. 구동사 (Phrasal Verbs)" },
        { word: "line up", meaning: "줄을 서다", root: "line(선) + up(완전히) → 선을 지어 늘어서다", cognates: "line(선), linear(선의)", group: "7. 구동사 (Phrasal Verbs)" }
    ];

    // 그룹별 데이터 정렬 구조화
    const groupedData = wordData.reduce((acc, word) => {
        if (!acc[word.group]) acc[word.group] = [];
        acc[word.group].push(word);
        return acc;
    }, {});

    // 플래시카드용 1차원 배열 (원래 순서 혹은 그룹핑된 순서)
    const flatWordList = [];
    Object.values(groupedData).forEach(group => flatWordList.push(...group));
    
    let currentCardIndex = 0;
    let isFlipped = false;

    // --- 초기화 및 리스트 렌더링 ---
    function initApp() {
        const listView = document.getElementById('listView');
        let htmlContent = '';

        for (const [groupName, words] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-6">
                    <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider mb-3 px-1"><i class="fa-solid fa-folder-tree mr-2"></i>${groupName}</h2>
                    <div class="space-y-3">
            `;
            
            words.forEach((item, index) => {
                // 고유 ID 생성
                const id = item.word.replace(/\s+/g, '-').toLowerCase();
                htmlContent += `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="toggleAccordion('${id}')">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${item.word}</h3>
                                <p class="text-sm text-gray-500 mt-1">${item.meaning}</p>
                            </div>
                            <div class="text-indigo-400">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-gray-50 px-4">
                            <div class="mb-3">
                                <span class="inline-block bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold mb-1">어원 분석</span>
                                <p class="text-sm text-gray-700 leading-relaxed">${item.root}</p>
                            </div>
                            <div class="pb-2">
                                <span class="inline-block bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded font-bold mb-1">동계어 (Family)</span>
                                <p class="text-sm text-gray-700 font-medium">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    // --- 아코디언 토글 로직 ---
    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            // 다른 열린 아코디언 모두 닫기 (선택적)
            /*
            document.querySelectorAll('.accordion-content.open').forEach(el => {
                el.classList.remove('open');
                const prevIcon = document.getElementById(el.id.replace('content-', 'icon-'));
                if(prevIcon) prevIcon.classList.remove('rotate-180');
            });
            */
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    // --- 플래시카드 토글 모드 ---
    function toggleMode() {
        const listView = document.getElementById('listView');
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            // Show Flashcards
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            // Show List
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-clone mr-1"></i> 카드모드';
        }
    }

    // --- 플래시카드 업데이트 및 네비게이션 ---
    function updateFlashcard() {
        const item = flatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = item.group;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${flatWordList.length}`;
        
        // 카드 넘길 때 항상 앞면으로 리셋
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        if (currentCardIndex > 0) {
            currentCardIndex--;
            updateFlashcard();
        } else {
            // 처음이면 마지막으로 루프
            currentCardIndex = flatWordList.length - 1;
            updateFlashcard();
        }
    }

    function nextCard() {
        if (currentCardIndex < flatWordList.length - 1) {
            currentCardIndex++;
            updateFlashcard();
        } else {
            // 마지막이면 처음으로 루프
            currentCardIndex = 0;
            updateFlashcard();
        }
    }

    // 앱 실행
    window.onload = initApp;
</script>
</body>
</html>
