      { id: 35, day: 4, word: "blend", meaning: "섞다; 조화되다", prefix: "Blend", root: "blandan (원시 게르만어: 뒤섞다)", story: "각기 다른 원두 가루나 물감 액체를 한 통에 넣고 세차게 휘저어 경계선이 안 보일 정도로 균일하게 혼합하는 동작입니다.", related: "blender (믹서기), blind (시야가 흐려 구분이 안 되는)" },
      { id: 36, day: 4, word: "cuisine", meaning: "요리", prefix: "coquere (요리하다)", root: "cocina (라틴어: 주방, 조리 영역)", story: "고유한 지역이나 국가의 주방 환경에서 조리 도구로 정갈하게 완성해 낸 고급스럽고 독특한 요리 방식입니다.", related: "cook (요리사), kitchen (부엌), concoct (혼합하여 지어내다)" },
      { id: 37, day: 4, word: "dairy", meaning: "우유의, 유제품의; 유제품 판매점", prefix: "deye (젖 짜는 하녀)", root: "daege (고대 영어: 유모)", story: "목장에서 매일 아침 젖소로부터 갓 짜낸 신선한 우유를 모아 버터, 치즈 등으로 가공하여 유통하는 낙농 제품입니다.", related: "milk (우유), dairy farm (낙농장), milkmaid (유모)" },
      { id: 38, day: 4, word: "comfort", meaning: "편안함; 위로, 위안; 편하게 하다; 위로하다", prefix: "com- (완전히 가득)", root: "fortis (라틴어: 든든하고 강한)", story: "슬픔에 빠져 탈진한 사람에게 완전히(com) 든든하고 강력한 힘(fort)을 실어주어 절망에서 건지고 위로해 주는 영혼의 안식입니다.", related: "force (힘), fort (요새), effort (노력을 밖으로 쏟다)" },
      { id: 39, day: 4, word: "uniform", meaning: "유니폼, 제복; 일정한, 균등한", prefix: "uni- (오직 단 하나)", root: "forma (라틴어: 규격 형태)", story: "학교나 군대 단체에서 일체감과 소속감을 부여하기 위해 모두가 오직 하나의 형태(form)로 통일해 맞춘 단체 제복입니다.", related: "unit (단위), form (형태), transform (변형하다), reform (개혁하다)" },
      { id: 40, day: 4, word: "vest", meaning: "조끼", prefix: "vestis (의류, 옷)", root: "vestire (라틴어: 옷을 입다)", story: "거추장스러운 소매 자락을 시원하게 잘라내고, 셔츠나 정장 자켓 안에 가볍고 단정하게 덧입어 몸을 보온하는 조끼입니다.", related: "invest (투자하다), divest (탈박하다)" },
      { id: 41, day: 4, word: "instant", meaning: "즉석요리의, 인스턴트의; 즉각적인; 순간", prefix: "in- (눈앞에 바로)", root: "sistere (라틴어: 우뚝 서 있다)", story: "뜨거운 물만 부으면 내 눈앞에(in) 지체 없이 완성되어 서서(sist) 오랜 조리 시간 없이 곧장 섭취하는 즉석 음식입니다.", related: "insist (주장하다), assist (도와 서다), consist (구성되다)" },
      { id: 42, day: 4, word: "outfit", meaning: "(특별한 날 입는) 옷, 의상 한 벌", prefix: "out (바깥용)", root: "fit (영어: 채비를 알맞게 갖추다)", story: "소풍, 파티, 특별한 예식에 참여하기 위해 모자와 신발까지 규격에 맞춰 완벽히 장만하여 바깥에 선보이는 의복입니다.", related: "fit (알맞은), fitting room (탈의실), unfit (부적합한)" },
      { id: 43, day: 4, word: "paste", meaning: "반죽; 풀; 붙이다", prefix: "Paste (이겨 만든 것)", root: "pastas (그리스어: 보리 죽)", story: "밀가루나 전분 가루에 물을 적절히 붓고 걸쭉하고 끈적끈적해질 때까지 세차게 치대어 고정용으로 쓰는 반죽과 풀입니다.", related: "pastry (과자), pasta (파스타), pastel (파스텔)" },
      { id: 44, day: 4, word: "feed on", meaning: "~을 먹고 살다", prefix: "feed (먹이를 먹이다)", root: "foda (원시 게르만어: 곡식 음식)", story: "초원의 가축이나 생명체들이 고유한 풀과 사료를 매일 입에 넣고 소화하며 생명력을 든든히 유지하고 살아가는 행위입니다.", related: "food (음식), fodder (사료), foster (양육하다, 기르다)" },
      { id: 45, day: 4, word: "nutrition", meaning: "영양, 영양물 섭취", prefix: "nutri- (어린 생명을 기르다)", root: "nutrire (라틴어: 양분을 공급하다)", story: "아기가 무럭무럭 건강하게 신체를 키울 수 있도록 엄마가 모유나 가공된 좋은 식재료를 통해 공급하는 영양 밸런스입니다.", related: "nutrition (영양), nurse (간호사), nursery (어린이집)" },
      { id: 46, day: 4, word: "length", meaning: "길이, 기간", prefix: "lang (긴 길의)", root: "-th (명사형 접미사)", story: "가장 길게 일직선으로 뻗은 상태를 나타내는 long의 명사형으로, 공간의 이치나 세월의 아득한 가로세로 길이입니다.", related: "long (긴), linger (오래 머물다), longevity (장수)" },
      { id: 47, day: 4, word: "cotton", meaning: "솜, 면화; 면직물, 무명실", prefix: "qutn (아랍어)", root: "coton (고대 프랑스어: 목화 솜)", story: "밭에서 가을철 하얗게 부풀어 오른 목화송이의 알맹이를 수확하여 부드러운 천이나 실을 짜내는 천연 솜과 면화입니다.", related: "cot (아기 침대 패드), cottier (목화 소작농)" },
      { id: 48, day: 4, word: "sew", meaning: "바느질하다, (바느질로) 만들다", prefix: "sew (바늘로 잇다)", root: "siwian (원시 게르만어: 실을 꿰다)", story: "찢어지거나 분리된 천 조각 사이로 실을 꿴 날카로운 바늘을 통과시켜 튼튼하게 고정하고 의복을 재봉해 만드는 동작입니다.", related: "sewing machine (재봉틀), seam (솔기, 꿰맨 선)" },
      { id: 49, day: 4, word: "chop", meaning: "자르다, 썰다", prefix: "chop (도끼 내리치다)", root: "choppen (중세 영어: 한 번에 자르다)", story: "도마 위에 딱딱한 야채나 고기를 올려두고 식칼이나 작두를 세차게 아래로 내리쳐 작은 조각으로 조각조각 써는 일입니다.", related: "chopper (도끼), chopstick (젓가락), chip (조각)" },
      { id: 50, day: 4, word: "ripen", meaning: "익다; 익히다", prefix: "ripe (수확 최적기)", root: "ripan (고대 영어: 성숙하다)", story: "푸른 나무에 걸린 과일이 계절의 햇살을 가득 머금고 수확하기 알맞게 당도와 단맛이 꽉 차오르는 성숙의 과정입니다.", related: "ripe (익은), reap (수확하다), reaper (수확기)" },
      { id: 51, day: 4, word: "roast", meaning: "굽다, 볶다; 구운", prefix: "roast (불판에 올리다)", root: "rostir (라틴어: 불을 쬐다)", story: "날고기나 딱딱한 커피 원두를 시빨갛게 타오르는 숯불 위 석쇠나 화덕에 직접 올려 기름을 빼며 고소하게 굽는 요리입니다.", related: "roaster (로스터), rotisserie (회전구이 통)" },
      { id: 52, day: 4, word: "stripe", meaning: "줄무늬", prefix: "stripe (채찍의 선)", root: "stribe (게르만어: 일직선의 띠)", story: "사나운 맹수의 표면이나 채찍을 맞았을 때 일직선으로 길게 평행하게 그어지는 형태의 반듯한 색상 띠 '줄무늬'입니다.", related: "strip (가느다란 조각), stripy (줄무늬의)" },
      { id: 53, day: 4, word: "dress up", meaning: "옷을 갖춰[격식을 차려] 입다", prefix: "directus (정돈된)", root: "dress + up (완전히 가득)", story: "집에서 입던 헐렁한 옷을 벗어 던지고, 예식이나 파티 참석을 위해 단정하게 격식을 갖추어 완벽하게 코디하는 행위입니다.", related: "direct (지시하다), address (주소), redress (개선하다)" },
      { id: 54, day: 4, word: "tray", meaning: "쟁반", prefix: "tray (나무 상자 기원)", root: "trig (고대 영어: 평평한 판)", story: "여러 개의 커피 잔이나 음식을 바닥에 떨어뜨리지 않고 식탁으로 한꺼번에 안전하게 나르기 위해 쓰는 평평한 쟁반입니다.", related: "trough (여물통), tree (나무 - 쟁반의 원자재)" },
      { id: 55, day: 4, word: "vegetarian", meaning: "채식주의자; 채식주의(자)의", prefix: "vegetable (채소)", root: "vegetus (라틴어: 생기 있고 활기찬)", story: "육류나 생선 고기를 일절 거부하고, 땅에서 자란 활기 가득한 초록색 야채와 채소(vegetable)만 골라 먹는 사람입니다.", related: "vegetable (야채), vegetate (단조롭게 살다), vigor (활력)" },
      { id: 56, day: 4, word: "leftover", meaning: "남은; 남은 음식", prefix: "left (남겨진)", root: "leave + over (초과하여 머무른)", story: "만찬이 끝나고 손님들이 다 소화하지 못해 식탁 선반 위에 그대로 주인이 먹도록 남겨두고 간 잔여 음식입니다.", related: "leave (떠나다), over (~너머), overlap (중복되다)" },
      { id: 57, day: 4, word: "costume", meaning: "의상, 복장; 분장", prefix: "con- (함께)", root: "consuetudo (라틴어: 관습, 전통 의복)", story: "특정한 국가나 할로윈 축제 무대 위에서 자기 개성을 뽐내기 위해 전통과 양식에 맞춰 착용하는 특수 복장입니다.", related: "custom (관습, 세관), accustom (익숙해지다), customer (고객)" },
      { id: 58, day: 4, word: "wear out", meaning: "많이 써서 낡게 하다, 닳다; 지치게 하다", prefix: "wear (옷 입다)", root: "werian (고대 영어: 마찰하다) + out (완전히)", story: "새 구두나 청바지라도 오랜 세월 도로를 누비며 입고 걷다 보면 직물이 완전히(out) 마찰되어 헤어지고 구멍 나다입니다.", related: "wear (입다), worn-out (지친, 닳아빠진)" },
      { id: 59, day: 4, word: "rotten", meaning: "썩은, 부패한", prefix: "rot (문드러지다)", root: "rotian (게르만어: 부패하다)", story: "신선한 과일이나 고기가 높은 기온 속에 오랜 시간 방치되어 세균에 의해 고약한 취를 풍기며 붕괴되어 썩은 상태입니다.", related: "rot (부패하다), rotter (야비한 자), moldy (곰팡이 핀)" },
      { id: 60, day: 4, word: "premium", meaning: "고가의, 고급의; 할증금, 포상금", prefix: "pre- (남들보다 앞서서)", root: "emere (라틴어: 값을 치르고 구매하다)", story: "최상의 고품질 상품을 남들보다 먼저(pre) 선점하기 위해 기본 가격 위에 추가로 얹어 지불하는 고가의 비용입니다.", related: "exemption (면제), redeem (상환하다), prompt (즉각적인)" },

      // === DAY 5 (Food & Daily Life 2) ===
      { id: 61, day: 5, word: "edible", meaning: "먹을 수 있는", prefix: "ed- (맛나게 씹다)", root: "edere (라틴어: 음식을 먹다)", story: "숲속에서 발견한 버섯이나 열매가 독성을 품지 않아 인간이 안심하고 섭취하여 먹을 수 있는 상태입니다.", related: "eat (먹다), obese (비만의), edible oil (식용유)" },
      { id: 62, day: 5, word: "detergent", meaning: "세탁 세제, 세정제", prefix: "de- (때를 바깥으로)", root: "tergere (라틴어: 문질러 깨끗이 닦다)", story: "하얀 와이셔츠 깃에 묻은 누런 땀때를 강력한 화학 성분으로 완전히(de) 깨끗하게 문질러 지워주는 가루 세제입니다.", related: "terse (간결한), detergent powder (세제 가루)" },
      { id: 63, day: 5, word: "flavor", meaning: "(재료 특유의) 맛과 향; 풍미를 더하다(with)", prefix: "flat- (코를 찌르는 향)", root: "flare (라틴어: 바람이 불어넣다)", story: "오븐 속 요리가 구워지며 맛있는 냄새가 공기 중 바람(flare)을 타고 거실로 퍼져 느껴지는 재료 고유의 풍미입니다.", related: "inflate (부풀리다), deflate (김빠지게 하다), flatulence (가스)" },
      { id: 64, day: 5, word: "loose", meaning: "헐거운, 느슨한; 풀린, 벗겨진", prefix: "loos- (매듭이 풀려 자유로운)", root: "leus (라틴어: 묶은 끈을 해제하다)", story: "허리띠나 단단히 묶은 나사못을 꽉 조이지 않아, 고정되지 못하고 유격이 생겨 아슬아슬하게 헐겁고 풀린 상태입니다.", related: "lose (잃다), loss (손실), loosen (느슨하게 풀다)" },
      { id: 65, day: 5, word: "alter", meaning: "변경하다, (옷을) 고쳐 만들다", prefix: "alter (나와 다른 또 하나)", root: "alius (라틴어: 다르게 바꾸다)", story: "길이가 맞지 않거나 디자인이 구식인 기성복 옷감을 잘라내어 내 몸에 딱 맞도록 형태를 다르게 변경하다입니다.", related: "alternative (대안), alien (외계인), alias (가명)" },
      { id: 66, day: 5, word: "fancy", meaning: "화려한, 장식적인; 값비싼", prefix: "fan- (머릿속 환상)", root: "phantazein (그리스어: 눈앞에 환상을 띄우다)", story: "평범함을 거부하고 귀한 보석 장식이 주렁주렁 박혀 눈이 부실 정도로 호화롭고 장식적이며 가격이 값비싼 가방입니다.", related: "fantasy (판타지), phantom (유령), phenomenon (경이로운 현상)" },

      { id: 68, day: 5, word: "peel", meaning: "(과일·채소 등의) 껍질을 벗기다; 벗겨지다; 과일 껍질", prefix: "pel- (과일의 가죽 껍데기)", root: "pellis (라틴어: 얇은 가죽 부위)", story: "맛있는 사과나 감자의 바깥 면을 감싸 질긴 보호 가죽(껍질)을 과도 칼날을 대어 얇게 깎아 벗겨내는 동작입니다.", related: "pelt (동물 가죽), film (얇은 필름 가죽)" },

      { id: 88, day: 5, word: "thread", meaning: "실; 실을 꿰다", prefix: "thrae- (물레를 돌려 실을 비틀다)", root: "thrawan (고대 영어: 길게 늘이다)", story: "솜뭉치나 양털을 물레에 걸고 배배 꼬아서 끊어지지 않는 얇고 긴 바느질용 일직선 줄, 즉 실입니다.", related: "throw (던지다), threadbare (올이 다 드러난)" },

    ];

    function App() {
      const [viewMode, setViewMode] = useState("home");
      const [selectedDay, setSelectedDay] = useState(3);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [bookmarked, setBookmarked] = useState(new Set());
      const [memorized, setMemorized] = useState(new Set());
      const [showMeaning, setShowMeaning] = useState(true);
      const [filterMode, setFilterMode] = useState("all"); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [speechRate, setSpeechRate] = useState(0.9);
      const [mobileTab, setMobileTab] = useState("card");

      const autoPlayTimer = useRef(null);

      const playPronunciation = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const cleanText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'en-US';
          utterance.rate = speechRate;
          window.speechSynthesis.speak(utterance);
        }
      };

      const playMeaning = (text) => {
        if ('speechSynthesis' in window) {
          const cleanText = text.replace(/[\(\)·\[\]~]/g, '');
          const utterance = new SpeechSynthesisUtterance(cleanText);
          utterance.lang = 'ko-KR';
          utterance.rate = 1.0;
          window.speechSynthesis.speak(utterance);
        }
      };

      const handleNext = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev + 1) % filteredWords.length);
        setShowMeaning(true);
      };

      const handlePrev = () => {
        if (filteredWords.length === 0) return;
        setCurrentIndex(prev => (prev - 1 + filteredWords.length) % filteredWords.length);
        setShowMeaning(true);
      };

      useEffect(() => {
        setCurrentIndex(0);
        setShowMeaning(true);
      }, [selectedDay, filterMode, searchQuery]);

      useEffect(() => {
        if (viewMode !== "study") return;
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
          if (e.key === "ArrowRight") handleNext();
          else if (e.key === "ArrowLeft") handlePrev();
          else if (e.key === " ") { e.preventDefault(); setShowMeaning(prev => !prev); }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [currentIndex, filterMode, searchQuery, selectedDay, filteredWords, viewMode]);

      const filteredWords = useMemo(() => {
        return WORDS_DATABASE.filter(item => {
          if (item.day !== selectedDay) return false;
          const matchesSearch = item.word.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.meaning.includes(searchQuery) ||
                                item.related.toLowerCase().includes(searchQuery.toLowerCase());
          if (!matchesSearch) return false;
          if (filterMode === "bookmarked") return bookmarked.has(item.id);
          if (filterMode === "not_memorized") return !memorized.has(item.id);
          return true;
        });
      }, [selectedDay, searchQuery, filterMode, bookmarked, memorized]);

      const currentWord = filteredWords[currentIndex] || filteredWords[0] || null;

      useEffect(() => {
        if (viewMode !== "study" || mobileTab !== "card") return;
        if (isPlaying && currentWord) {
          playPronunciation(currentWord.word);
          autoPlayTimer.current = setTimeout(() => {
            if (showMeaning) playMeaning(currentWord.meaning);
            autoPlayTimer.current = setTimeout(() => { handleNext(); }, 3500);
          }, 2000);
        }
        return () => { if (autoPlayTimer.current) clearTimeout(autoPlayTimer.current); };
      }, [isPlaying, currentIndex, currentWord, viewMode, mobileTab]);

      const toggleBookmark = (id) => {
        setBookmarked(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; });
      };

      const toggleMemorized = (id) => {
        setMemorized(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; });
      };

      const getProgressMetrics = (day) => {
        const total = WORDS_DATABASE.filter(w => w.day === day).length;
        const mastered = WORDS_DATABASE.filter(w => w.day === day && memorized.has(w.id)).length;
        return { total, mastered, percentage: total > 0 ? Math.round((mastered / total) * 100) : 0 };
      };

      const d3Progress = useMemo(() => getProgressMetrics(3), [memorized]);
      const d4Progress = useMemo(() => getProgressMetrics(4), [memorized]);
      const d5Progress = useMemo(() => getProgressMetrics(5), [memorized]);

      const enterStudy = (day) => {
        setSelectedDay(day);
        setFilterMode("all");
        setSearchQuery("");
        setMobileTab("card");
        setViewMode("study");
      };

      if (viewMode === "home") {
        return (
          <div class="h-screen w-full flex flex-col justify-between bg-[#05070c] relative p-4 md:p-6 pb-safe overflow-y-auto">
            <div class="absolute inset-x-0 top-0 h-1 zebra-header"></div>
            <div class="text-center mt-12 mb-4">
              <div class="flex items-center justify-center gap-2 mb-2">
                <span class="px-2.5 py-0.5 bg-emerald-500 text-[#05070c] font-black text-[10px] rounded tracking-widest uppercase shadow-md">ZEBRA ENG</span>
                <span class="text-xs text-emerald-400 font-mono">중등 고난도 [22개정]</span>
              </div>
              <h1 class="text-2xl font-black text-white tracking-tight">중학고난도 3-5과 단어장</h1>
              <p class="text-xs text-slate-400 mt-2 max-w-xs mx-auto leading-normal">공부하고 싶은 Day를 선택해 주세요. 1:1 형태 구조 분석 및 동계어 명세가 완전 제공됩니다.</p>
            </div>

            <div class="flex-1 flex flex-col justify-center gap-4 max-w-sm mx-auto w-full px-2">
              {[3, 4, 5].map(day => {
                const prog = day === 3 ? d3Progress : day === 4 ? d4Progress : d5Progress;
                const titles = { 3: "Day 03: 감정 & 기분", 4: "Day 04: 푸드 & 일상생활 I", 5: "Day 05: 푸드 & 일상생활 II" };
                const desc = { 3: "panic(공포), astound 등 30개 표제어", 4: "kettle(주전자), cuisine 등 30개 표제어", 5: "edible(먹을 수 있는), flavor 등 30개 표제어" };
                return (
                  <div key={day} onClick={() => enterStudy(day)} class="bg-[#0c101b] border border-slate-800/80 rounded-2xl p-4 flex flex-col justify-between hover:border-emerald-500/50 transition-all cursor-pointer shadow-lg relative active:scale-98">
                    <div class="absolute top-4 right-4 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[9px] font-mono px-2 py-0.5 rounded-full font-bold">D0{day}</div>
                    <div>
                      <h3 class="text-sm font-extrabold text-white">{titles[day]}</h3>
                      <p class="text-[11px] text-slate-400 mt-1">{desc[day]}</p>
                    </div>
                    <div class="mt-3">
                      <div class="flex justify-between text-[9px] text-slate-500 mb-1">
                        <span>학습률 ({prog.mastered}/{prog.total} 단어)</span>
                        <span class="font-bold text-emerald-400">{prog.percentage}%</span>
                      </div>
                      <div class="w-full h-1 bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                        <div class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full" style={{ width: `${prog.percentage}%` }}></div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div class="text-center text-[9px] text-slate-700 mt-4 mb-2">© 얼룩말영어학원. All Rights Reserved.</div>
          </div>
        );
      }

      return (
        <div class="h-screen w-full flex flex-col bg-[#05070c] text-slate-100 relative overflow-hidden pb-safe">
          <div class="p-3 bg-[#090d16] border-b border-slate-800/80 flex items-center justify-between flex-shrink-0 z-40">
            <div class="flex items-center gap-1.5">
              <button onClick={() => { setIsPlaying(false); setViewMode("home"); }} class="text-xs font-bold text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded-lg bg-emerald-500/5 flex items-center gap-1 active:scale-95">🏠 홈</button>
              <span class="text-xs font-mono font-bold text-emerald-400">D{selectedDay}</span>
              <span class="text-[10px] text-slate-500 font-mono">({currentIndex + 1}/{filteredWords.length})</span>
            </div>
            {mobileTab === "card" && (
              <div class="flex items-center gap-2">
                <select value={speechRate} onChange={(e) => setSpeechRate(parseFloat(e.target.value))} class="bg-[#0f1524] text-[10px] text-slate-300 rounded border border-slate-800 px-1 py-0.5 focus:outline-none">
                  <option value="0.7">0.7x</option>
                  <option value="0.9">0.9x</option>
                  <option value="1.1">1.1x</option>
                </select>
                <button onClick={() => setIsPlaying(!isPlaying)} class={`px-2.5 py-1 text-[10px] font-bold rounded-full transition-all ${isPlaying ? "bg-red-500 text-white" : "bg-emerald-500 text-[#05070c]"}`}>{isPlaying ? "정지" : "▶ 자동"}</button>
              </div>
            )}
          </div>

          <div class="flex-1 overflow-hidden relative">
            {mobileTab === "card" && (
              <div class="h-full flex flex-col justify-between p-4 pb-16 overflow-y-auto">
                {currentWord ? (
                  <div class="w-full max-w-sm mx-auto flex flex-col gap-4 py-2">
                    <div onClick={() => setShowMeaning(prev => !prev)} class="perspective-1000 w-full cursor-pointer h-52 select-none active:scale-98 transition-transform duration-200">
                      <div class={`relative w-full h-full duration-500 preserve-3d transition-transform ${!showMeaning ? "rotate-y-180" : ""}`}>
                        
                        {/* CARD FRONT */}
                        <div class="absolute w-full h-full bg-[#0c101b] border border-slate-800 rounded-2xl flex flex-col justify-between p-4 shadow-lg backface-hidden glow-emerald">
                          <div class="flex justify-between w-full">
                            <button onClick={(e) => { e.stopPropagation(); toggleBookmark(currentWord.id); }} class={`px-2.5 py-0.5 rounded-full text-[9px] font-bold border ${bookmarked.has(currentWord.id) ? "border-amber-500/30 bg-amber-500/10 text-amber-400" : "border-slate-800 text-slate-500"}`}>★ {bookmarked.has(currentWord.id) ? "북마크됨" : "북마크"}</button>
                            <span class="text-[9px] font-mono text-slate-600 font-bold uppercase tracking-wider">Word Card</span>
                          </div>
                          <div class="text-center">
                            <h2 class="text-2xl font-black text-white tracking-tight select-all">{currentWord.word}</h2>
                            <p class="text-[9px] text-slate-500 mt-1">터치하여 한글 뜻 뒤집기</p>
                          </div>
                          <div class="flex justify-center">
                            <button onClick={(e) => { e.stopPropagation(); playPronunciation(currentWord.word); }} class="px-3 py-1 rounded-full bg-[#131929] border border-slate-800 text-emerald-400 text-xs font-semibold flex items-center gap-1">🔊 발음 듣기</button>
                          </div>
                        </div>

                        {/* CARD BACK */}
                        <div class="absolute w-full h-full bg-[#0c101b] border border-emerald-500/20 rounded-2xl flex flex-col justify-between p-4 shadow-lg backface-hidden rotate-y-180">
                          <div class="flex justify-between w-full">
                            <span class="text-[9px] font-mono text-emerald-500 font-bold uppercase tracking-wider">Meaning Card</span>
                            <button onClick={(e) => { e.stopPropagation(); toggleMemorized(currentWord.id); }} class={`px-2.5 py-0.5 rounded-full text-[9px] font-bold border ${memorized.has(currentWord.id) ? "border-emerald-500/30 bg-emerald-500/10 text-emerald-400" : "border-slate-800 text-slate-500"}`}>✔ {memorized.has(currentWord.id) ? "암기완료" : "외웠음"}</button>
                          </div>
                          <div class="text-center px-1">
                            <p class="text-lg font-bold text-emerald-400 tracking-tight leading-snug">{currentWord.meaning}</p>
                            <button onClick={(e) => { e.stopPropagation(); playMeaning(currentWord.meaning); }} class="text-[9px] text-slate-500 mt-1 inline-flex items-center gap-1">🔊 뜻 듣기</button>
                          </div>
                          <div class="text-center text-[9px] text-slate-600">다시 터치하면 영단어가 보입니다</div>
                        </div>

                      </div>
                    </div>

                    <div class="w-full bg-[#0c101b] border border-slate-800 rounded-2xl p-4 shadow-md text-left">
                      <div class="flex items-center gap-1.5 mb-2">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[9px] font-extrabold tracking-widest text-emerald-400 uppercase">Zebra 어원 가이드</span>
                      </div>
                      <div class="space-y-2.5 fade-in">
                        <div class="flex flex-wrap items-center gap-1 text-[10px] font-semibold">
                          <span class="px-2 py-0.5 bg-slate-900 rounded-lg text-slate-300 border border-slate-800">구조: <b class="text-emerald-400">{currentWord.prefix}</b></span>
                          <span class="text-slate-700">+</span>
                          <span class="px-2 py-0.5 bg-slate-900 rounded-lg text-slate-300 border border-slate-800">어근: <b class="text-emerald-400">{currentWord.root}</b></span>
                        </div>
                        <p class="text-slate-300 text-xs leading-relaxed font-normal">{currentWord.story}</p>
                        <div class="pt-2 border-t border-slate-800/80">
                          <span class="text-[9px] font-extrabold text-amber-400 block mb-1">같은 어근 공유 단어 (Cognates)</span>
                          <div class="text-xs text-slate-300 bg-slate-950/40 p-2 rounded-xl border border-slate-900/60 leading-normal">{currentWord.related}</div>
                        </div>
                      </div>
                    </div>

                    <div class="flex justify-between items-center gap-3 mt-1">
                      <button onClick={handlePrev} disabled={filteredWords.length <= 1} class="flex-1 py-2.5 text-center text-xs font-bold rounded-xl bg-[#0f1524] border border-slate-800 text-slate-200 active:scale-95 disabled:opacity-30">◀ 이전 단어</button>
                      <button onClick={handleNext} disabled={filteredWords.length <= 1} class="flex-1 py-2.5 text-center text-xs font-black rounded-xl bg-emerald-500 text-[#05070c] active:scale-95 shadow-md shadow-emerald-500/10">다음 단어 ▶</button>
                    </div>
                  </div>
                ) : (
                  <div class="text-center py-12">
                    <p class="text-slate-400 text-xs">필터링된 단어가 없습니다.</p>
                    <button onClick={() => { setFilterMode("all"); setSearchQuery(""); }} class="mt-2 text-xs text-emerald-400 underline font-semibold">초기화</button>
                  </div>
                )}
              </div>
            )}

            {mobileTab === "list" && (
              <div class="h-full flex flex-col bg-[#05070c] p-4 pb-16 overflow-hidden">
                <div class="flex gap-1.5 mb-3 flex-shrink-0">
                  <div class="relative flex-1">
                    <input type="text" placeholder="단어, 뜻, 파생어 검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} class="w-full pl-8 pr-3 py-2 bg-[#090d16] border border-slate-800 rounded-xl text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
                    <svg class="w-3 h-3 absolute left-3 top-3 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                  </div>
                  <select value={filterMode} onChange={(e) => setFilterMode(e.target.value)} class="bg-[#0f1524] text-xs text-slate-300 border border-slate-800 rounded-xl px-2 focus:outline-none"><option value="all">전체</option><option value="bookmarked">★ 북마크</option><option value="not_memorized">미암기</option></select>
                </div>

                <div class="flex-1 overflow-y-auto divide-y divide-slate-900 bg-[#080b12] rounded-xl border border-slate-800/80 pr-1">
                  {filteredWords.length === 0 ? (
                    <div class="p-8 text-center text-xs text-slate-600">검색 조건에 맞는 단어가 없습니다.</div>
                  ) : (
                    filteredWords.map((item, idx) => {
                      const isActive = currentWord && currentWord.id === item.id;
                      const wordIndex = WORDS_DATABASE.filter(w => w.day === selectedDay).indexOf(item) + 1;
                      return (
                        <div key={item.id} onClick={() => { setCurrentIndex(idx); setMobileTab("card"); }} class={`p-3 text-left cursor-pointer transition-all flex items-center justify-between ${isActive ? "bg-emerald-950/20 border-l-4 border-emerald-500 pl-2" : "hover:bg-slate-800/10"}`}>
                          <div class="min-w-0 pr-2">
                            <span class="text-[10px] font-mono text-slate-600 mr-1.5">#{wordIndex}</span>
                            <span class={`font-bold text-xs tracking-tight ${isActive ? "text-emerald-300" : "text-slate-300"}`}>{item.word}</span>
                            <p class="text-[11px] text-slate-500 truncate mt-0.5 pl-5">{item.meaning}</p>
                          </div>
                          <div class="flex items-center gap-1.5" onClick={e => e.stopPropagation()}>
                            <button onClick={() => toggleBookmark(item.id)} class={`p-1 text-xs ${bookmarked.has(item.id) ? "text-amber-400" : "text-slate-700"}`}>★</button>
                            <button onClick={() => toggleMemorized(item.id)} class={`p-1 text-xs ${memorized.has(item.id) ? "text-emerald-400" : "text-slate-700"}`}>✔</button>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )}
          </div>

          <div class="fixed bottom-0 left-0 right-0 h-16 bg-[#0c101b] border-t border-slate-800/80 flex justify-around items-center px-4 pb-safe z-50">
            <button onClick={() => { setIsPlaying(false); setViewMode("home"); }} class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-slate-300"><span class="text-base">🏠</span><span class="text-[9px] font-bold">홈</span></button>
            <button onClick={() => { setMobileTab("card"); setShowMeaning(true); }} class={`flex flex-col items-center gap-0.5 ${mobileTab === "card" && viewMode === "study" ? "text-emerald-400" : "text-slate-500"}`}><span class="text-base">🃏</span><span class="text-[9px] font-extrabold">카드 학습</span></button>
            <button onClick={() => { setMobileTab("list"); }} class={`flex flex-col items-center gap-0.5 ${mobileTab === "list" && viewMode === "study" ? "text-emerald-400" : "text-slate-500"}`}><span class="text-base">📋</span><span class="text-[9px] font-extrabold">단어 목록</span></button>
          </div>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
