                { word: "dispose", meaning: "처리하다, 처분하다", etymology: "dis-(사방으로) + pose(놓다). 물건들을 각각 있어야 할 자리에 적절히 분류하여 배치하거나 없애다.", cognates: "disposal (처분), disposable (일회용의)" },
                { word: "discard", meaning: "(불필요한 것을) 버리다, 처분하다", etymology: "dis-(벗어나다) + card(카드). 카드 게임을 할 때 쓸모없는 패를 손쥐고 있던 더미 밖으로 '버리는 행위'에서 유래.", cognates: "card (카드)" },
                { word: "appliance", meaning: "(가정용) 기구, 장치, 전기 제품", etymology: "apply(적용하다, 사용하다) + ance. 특정한 가사 노동의 목적을 달성하기 위해 알맞게 갖추어 쓰는 기계 장치.", cognates: "apply (적용하다), applicable (적용 가능한)" },
                { word: "spacious", meaning: "넓은, 광대한", etymology: "space(공간) + ious(가득 찬). 공간적 여유가 넘쳐나서 사방이 탁 트이고 시원한 상태를 묘사.", cognates: "space (공간), spaciously (넓게)" },
                { word: "chore", meaning: "(집안의) 자질구레한 일, 허드렛일", etymology: "고대 영어 cierr(일, 회전, 차례)에서 유래. 주기적으로 돌아오는 일상적이고 반복적인 가사 활동.", cognates: "charwoman (청소부 대행)" },
                { word: "polish", meaning: "닦다, 광[윤]을 내다; (문장 등을) 다듬다", etymology: "라틴어 polire( 매끄럽게 하다). 표면을 마찰시켜 빛나게 하거나 글을 정교하게 가다듬는 행위.", cognates: "polisher (광택기), polite (공손한, 세련된)" },
                { word: "flush", meaning: "(물·액체 등으로) 씻어 내리다; (얼굴을) 붉히다, 상기시키다", etymology: "의성어적 기원과 라틴어 fluere(흐르다)의 영향. 물이 확 쏟아져 내리거나 핏기가 얼굴로 확 솟구치는 양상.", cognates: "fluid (액체)" },
                { word: "nap", meaning: "낮잠, 선잠; 선잠을 자다, 졸다", etymology: "고대 영어 hnappian(가볍게 졸다)에서 유래. 밤에 자는 긴 잠이 아니라 낮에 잠깐 취하는 휴식용 잠.", cognates: "naptime (낮잠 시간)" },
                { word: "outlet", meaning: "코드 구멍, 콘센트; 할인점", etymology: "out(밖으로) + let(내보내다). 전류를 외부로 내보내는 구멍, 혹은 재고 상품을 시중으로 내보내는 상점.", cognates: "let (하게 하다)" },
                { word: "trim", meaning: "다듬다, 손질하다; 정돈(된 상태); 잘 정돈된", etymology: "고대 영어 trymian(굳건하게 하다, 정돈하다)에서 유래. 불필요한 부분을 쳐내어 가장 알맞고 보기 좋은 상태로 만들다.", cognates: "trimmer (분형기, 다듬는 도구)" },
                { word: "crack", meaning: "깨지다, 금이 가다; 갈라진 금, 틈", etymology: "단단한 물체가 깨지거나 부딪힐 때 발생하는 날카로운 파열음인 의성어 '크랙'에서 유래.", cognates: "cracker (크래커, 과자), crackle (탁탁 소리를 내다)" },
                { word: "leak", meaning: "새어나옴, 누출; 새다, 누출하다", etymology: "고대 노르드어 leka(물방울이 떨어지다)에서 유래. 틈새를 통해 액체나 기체, 정보 등이 외부로 빠져나가는 현상.", cognates: "leakage (누출, 누수), leaky (구멍이 난)" },
                { word: "run out of", meaning: "~을 다 써 버리다, ~을 바닥내다", etymology: "run(달리다/진행하다) + out of(~의 밖으로). 보유하고 있던 자원의 경계선 바깥으로 완전히 달려 나가 다 떨어지다.", cognates: "run (달리다)" },
                { word: "hang up", meaning: "~을 걸다[매달다]; 전화를 끊다", etymology: "hang(매달다) + up(위로). 과거 전화기의 송수신기를 벽에 걸려 있는 본체 고리에 위로 '걸어두던 행위'에서 유래.", cognates: "hang (걸다), hanger (옷걸이)" }
            ]
        };

        let currentDay = 5;
        let currentMode = 'list';
        let cardIndex = 0;

        function switchDay(day) {
            currentDay = day;
            cardIndex = 0; // 데이 전환 시 인덱스 초기화 (버그 방지)
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-200');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeTab = document.getElementById(`tab-${day}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white');

            renderContent();
        }

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0; // 모드 전환 시 인덱스 초기화
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const footer = document.getElementById('app-footer');
            const data = vocabData[currentDay];

            if (currentMode === 'list') {
                footer.innerHTML = `© 얼룩말영어학원 | 스마트 단어 학습 시스템`;
                container.innerHTML = data.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = data[cardIndex];
                footer.innerHTML = `
                    <div class="flex justify-between items-center px-4 py-1">
                        <button onclick="prevCard()" class="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg ${cardIndex === 0 ? 'opacity-50 pointer-events-none' : ''}">이전</button>
                        <span class="font-semibold text-slate-600">${cardIndex + 1} / ${data.length}</span>
                        <button onclick="nextCard()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg ${cardIndex === data.length - 1 ? 'opacity-50 pointer-events-none' : ''}">다음</button>
                    </div>
                `;
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-4xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData[currentDay].length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Init Day 5
        switchDay(5);
    </script>
</body>
</html>
